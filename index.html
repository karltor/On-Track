<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>På Rätt Spår - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen overflow-hidden flex font-sans">

    <aside class="w-80 bg-white border-r border-slate-200 flex flex-col shadow-sm z-10">
        <div class="p-6 border-b border-slate-100 flex items-center gap-3">
            <div class="w-10 h-10 bg-amber-500 rounded-lg flex items-center justify-center text-white shadow-md">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" x2="4" y1="22" y2="15"></line></svg>
            </div>
            <h1 class="text-2xl font-black text-slate-800 tracking-tight">På Rätt Spår</h1>
        </div>
        
        <div class="p-4 flex-1 overflow-hidden flex flex-col">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3 px-2">Dina Bräden</h2>
            <div id="boardsList" class="space-y-1 overflow-y-auto flex-1">
                </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative bg-slate-50/50">
        <header class="h-20 border-b border-slate-200 bg-white/80 backdrop-blur px-8 flex items-center justify-end gap-3 sticky top-0 z-10">
            <button onclick="setView('import')" class="px-4 py-2 text-sm font-semibold text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-md transition-colors flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" x2="12" y1="3" y2="15"></line></svg>
                Importera JSON
            </button>
            <button onclick="createNewBoard()" class="px-4 py-2 text-sm font-semibold text-white bg-slate-800 hover:bg-slate-900 rounded-md transition-colors flex items-center gap-2 shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="5" y2="19"></line><line x1="5" x2="19" y1="12" y2="12"></line></svg>
                Skapa Nytt Bräde
            </button>
        </header>

        <div id="mainContent" class="flex-1 overflow-y-auto p-8">
            </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, doc, setDoc, writeBatch } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCZGQi85oGYum0mnUowUcw4QMt3tyoHK1U",
            authDomain: "on-track-d77d0.firebaseapp.com",
            projectId: "on-track-d77d0",
            storageBucket: "on-track-d77d0.firebasestorage.app",
            messagingSenderId: "515234485983",
            appId: "1:515234485983:web:daa02d8bbc09e30a65fb6a",
            measurementId: "G-W1CNJ79WPW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const STORAGE_KEY = 'pa_sparet_saved_boards';
        const DEFAULTS_KEY = 'pa_sparet_imported_defaults';
        let boards = [];
        let selectedIndex = null;
        let editData = null; 

        function loadBoards() {
            try { boards = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } 
            catch { boards = []; }
            renderSidebar();
        }

        function saveBoards() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(boards));
            renderSidebar();
        }

        async function loadDefaultPackages() {
            let imported = JSON.parse(localStorage.getItem(DEFAULTS_KEY)) || [];
            const filesToCheck = ['paket1.json', 'paket2.json']; 
            let newlyImported = false;

            for (const file of filesToCheck) {
                if (!imported.includes(file)) {
                    try {
                        const response = await fetch(file);
                        if (response.ok) {
                            const data = await response.json();
                            const packages = Array.isArray(data) ? data : [data];
                            packages.forEach(pkg => { if (pkg.title && pkg.boards) { boards.push(pkg); newlyImported = true; } });
                            imported.push(file); 
                        }
                    } catch (e) {}
                }
            }
            if (newlyImported) { saveBoards(); localStorage.setItem(DEFAULTS_KEY, JSON.stringify(imported)); }
        }

        window.setView = (view, index = null) => {
            const mainEl = document.getElementById('mainContent');
            selectedIndex = index;
            renderSidebar(); 
            
            if (view === 'welcome') {
                mainEl.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-slate-400 text-center">
                        <div class="w-24 h-24 bg-slate-100 rounded-full flex items-center justify-center mb-6">
                            <svg class="w-12 h-12 text-slate-300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" x2="16.65" y1="21" y2="16.65"></line></svg>
                        </div>
                        <h2 class="text-2xl font-bold text-slate-700 mb-2">Välkommen till På Rätt Spår</h2>
                        <p>Välj ett paket till vänster eller skapa ett nytt.</p>
                    </div>
                `;
            } 
            else if (view === 'import') {
                mainEl.innerHTML = `
                    <div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow-sm border border-slate-200">
                        <h2 class="text-3xl font-black text-slate-800 mb-2">Importera från JSON</h2>
                        <p class="text-slate-500 mb-6">Klistra in koden här för att lägga till spelet.</p>
                        <textarea id="jsonInput" class="w-full h-64 bg-slate-50 border border-slate-200 rounded-lg p-4 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 mb-4" placeholder='{"title": "...", "boards": [...]}'></textarea>
                        <div class="flex items-center justify-end">
                            <button onclick="handleImport()" class="px-6 py-3 bg-amber-500 hover:bg-amber-600 text-white font-bold rounded-lg shadow-sm transition">Spara paket</button>
                        </div>
                    </div>
                `;
            }
            else if (view === 'view' && index !== null) {
                const b = boards[index];
                let questionsHtml = b.boards.map((q, i) => `
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                        <h4 class="text-xs font-bold text-slate-400 uppercase mb-4 tracking-wider">Fråga ${i+1}</h4>
                        <div class="space-y-2 mb-6">
                            ${q.clues.map((clue, ci) => `<div class="flex gap-4"><span class="font-bold text-amber-500 w-8 text-right">${[10,8,6,4,2][ci]}p</span> <span class="text-slate-700">${clue}</span></div>`).join('')}
                        </div>
                        <div class="bg-emerald-50 text-emerald-800 p-4 rounded-lg border border-emerald-100 flex items-center justify-between">
                            <span class="text-sm font-semibold uppercase text-emerald-600">Svar</span>
                            <span class="font-black text-xl">${q.answer}</span>
                        </div>
                    </div>
                `).join('');

                mainEl.innerHTML = `
                    <div class="max-w-4xl mx-auto pb-20">
                        <div class="flex justify-between items-end mb-8">
                            <div>
                                <h2 class="text-4xl font-black text-slate-800 mb-2">${b.title}</h2>
                                <p class="text-slate-500 font-medium">${b.boards.length} frågor i detta paket</p>
                            </div>
                            <div class="flex gap-3">
                                <button onclick="editBoard(${index})" class="px-4 py-2 bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 rounded-lg font-semibold transition">Redigera</button>
                                <button onclick="startSession(${index})" class="px-6 py-2 bg-amber-500 hover:bg-amber-600 text-white rounded-lg font-bold transition shadow-sm flex items-center gap-2 text-lg">Starta Spel</button>
                            </div>
                        </div>
                        <div class="space-y-6">${questionsHtml}</div>
                        <div class="mt-12 text-center text-slate-300">———</div>
                    </div>
                `;
            }
            else if (view === 'edit') { renderEditForm(); }
        };

        window.exportBoard = (index) => {
            const data = JSON.stringify(boards[index], null, 2);
            navigator.clipboard.writeText(data);
            alert("Paketets JSON-kod har kopierats till urklipp!");
        };

        function renderSidebar() {
            const listEl = document.getElementById('boardsList');
            listEl.innerHTML = '';
            boards.forEach((board, index) => {
                const isActive = index === selectedIndex;
                const item = document.createElement('div');
                item.className = `group relative w-full text-left p-3 rounded-lg border transition-all flex flex-col gap-1 ${isActive ? 'bg-amber-50 border-amber-200 shadow-sm' : 'bg-transparent border-transparent hover:bg-slate-100'}`;
                item.innerHTML = `
                    <div class="flex justify-between items-start cursor-pointer" onclick="setView('view', ${index})">
                        <h3 class="font-bold text-sm ${isActive ? 'text-amber-900' : 'text-slate-700'} leading-tight pr-2">${board.title}</h3>
                        <span class="text-[10px] font-bold ${isActive ? 'text-amber-600' : 'text-slate-400'}">${board.boards.length}</span>
                    </div>
                    <div class="flex gap-2 mt-2 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="exportBoard(${index})" class="text-[10px] font-bold text-blue-500 hover:text-blue-700 uppercase tracking-tighter">Exportera</button>
                        <button onclick="deleteBoard(${index})" class="text-[10px] font-bold text-red-400 hover:text-red-600 uppercase tracking-tighter">Radera</button>
                    </div>
                `;
                listEl.appendChild(item);
            });
        }

        window.createNewBoard = () => { editData = { title: "Nytt Spelbräde", boards: [{ answer: "", clues: ["","","","",""] }] }; setView('edit'); };
        window.editBoard = (index) => { editData = JSON.parse(JSON.stringify(boards[index])); editData.editIndex = index; setView('edit'); };
        window.updateData = (qIndex, field, value, clueIndex) => { if (field === 'answer') editData.boards[qIndex].answer = value; else editData.boards[qIndex].clues[clueIndex] = value; };
        window.addQuestion = () => { editData.boards.push({ answer: "", clues: ["","","","",""] }); renderEditForm(); };
        window.removeQuestion = (index) => { if(confirm("Ta bort frågan?")) { editData.boards.splice(index, 1); renderEditForm(); } };
        window.cancelEdit = () => editData.editIndex !== undefined ? setView('view', editData.editIndex) : setView('welcome');
        window.saveEdit = () => { 
            editData.title = document.getElementById('editTitle').value || "Namnlöst Spel";
            if (editData.editIndex !== undefined) { let i = editData.editIndex; delete editData.editIndex; boards[i] = editData; setView('view', i); } 
            else { boards.push(editData); setView('view', boards.length - 1); }
            saveBoards();
        };

        window.renderEditForm = () => {
            const mainEl = document.getElementById('mainContent');
            let questionsHtml = editData.boards.map((q, qIndex) => `
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-6">
                    <div class="flex justify-between items-center mb-4"><h4 class="text-sm font-black text-slate-800 uppercase">Fråga ${qIndex + 1}</h4><button onclick="removeQuestion(${qIndex})" class="text-red-500 text-xs font-bold uppercase">Radera</button></div>
                    <input type="text" value="${q.answer}" onchange="updateData(${qIndex}, 'answer', this.value)" class="w-full bg-slate-50 border border-slate-200 rounded p-3 mb-4 font-bold text-lg" placeholder="Rätt svar">
                    <div class="space-y-2">
                        ${[10,8,6,4,2].map((p, i) => `<div class="flex items-center gap-3"><span class="font-bold text-amber-500 w-6 text-right">${p}p</span> <input type="text" value="${q.clues[i]}" onchange="updateData(${qIndex}, 'clue', this.value, ${i})" class="flex-1 bg-slate-50 border border-slate-200 rounded p-2 text-sm" placeholder="Ledtråd..."></div>`).join('')}
                    </div>
                </div>
            `).join('');
            mainEl.innerHTML = `<div class="max-w-3xl mx-auto pb-20"><div class="flex justify-between items-center mb-8 sticky top-0 bg-slate-50/90 backdrop-blur py-4 z-10 border-b border-slate-200"><div class="flex-1 mr-8"><input type="text" id="editTitle" value="${editData.title}" class="w-full bg-transparent text-3xl font-black text-slate-800 focus:outline-none" placeholder="Paketnamn"></div><div class="flex gap-2"><button onclick="cancelEdit()" class="px-4 py-2 font-bold text-slate-400">Avbryt</button><button onclick="saveEdit()" class="px-6 py-2 bg-emerald-500 text-white rounded-lg font-bold">Spara</button></div></div>${questionsHtml}<button onclick="addQuestion()" class="w-full py-4 border-2 border-dashed border-slate-300 text-slate-400 font-bold rounded-xl hover:border-amber-400 hover:text-amber-500">+ Lägg till fråga</button></div>`;
        };

        window.handleImport = () => {
            try {
                const parsed = JSON.parse(document.getElementById('jsonInput').value);
                boards.push(parsed); saveBoards(); setView('view', boards.length - 1);
            } catch (e) { alert("Ogiltig JSON"); }
        };

        window.deleteBoard = (index) => { if(confirm("Radera hela paketet?")) { boards.splice(index, 1); saveBoards(); setView('welcome'); } };

        window.startSession = async (index) => {
            const selectedBoard = boards[index];
            const pin = Math.floor(1000 + Math.random() * 9000).toString();
            const adminToken = Math.random().toString(36).substring(2, 15);
            const publicBoards = selectedBoard.boards.map(b => ({ clues: b.clues }));
            const secretAnswers = selectedBoard.boards.map(b => b.answer);
            try {
                const batch = writeBatch(db);
                batch.set(doc(db, "sessions", pin), { adminToken, gameState: "lobby", boards: publicBoards, currentBoardIndex: 0, currentClueIndex: 0, teams: [], createdAt: new Date().toISOString() });
                batch.set(doc(db, "sessions", `${pin}_${adminToken}`), { answers: secretAnswers });
                await batch.commit();
                localStorage.setItem(`pa_sparet_admin_${pin}`, adminToken);
                window.location.href = `host.html?session=${pin}`;
            } catch (error) { alert("Firebase Error"); }
        };

        loadBoards();
        loadDefaultPackages();
        setView('welcome');
    </script>
</body>
</html>

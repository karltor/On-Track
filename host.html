<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>På Rätt Spår - Lärarvy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .drag-over { background-color: #f1f5f9; border: 2px dashed #94a3b8 !important; }
    </style>
</head>
<body class="bg-white text-slate-900 min-h-screen font-sans selection:bg-amber-200 relative">
    <div id="app" class="max-w-7xl mx-auto p-4 md:p-8 pb-24">
        <div class="flex items-center justify-center h-64">
            <p class="text-slate-500 font-bold animate-pulse text-xl">Laddar session...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, doc, collection, onSnapshot, updateDoc, writeBatch } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        const app = initializeApp({
            apiKey: "AIzaSyCZGQi85oGYum0mnUowUcw4QMt3tyoHK1U",
            authDomain: "on-track-d77d0.firebaseapp.com",
            projectId: "on-track-d77d0"
        });
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const sessionPin = urlParams.get('session');
        const isAdmin = localStorage.getItem(`pa_sparet_admin_${sessionPin}`);

        if (!sessionPin || !isAdmin) {
            alert("Ogiltig session."); window.location.href = 'index.html';
        }

        let sessionData = null;
        let playersData = [];
        let secretAnswers = [];
        let finalResults = null;
        const POINTS = [10, 8, 6, 4, 2];
        let hasCleanedUp = false;

        const basePath = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/'));
        const playUrl = `${window.location.origin}${basePath}/play.html?session=${sessionPin}`;

        // Wait for auth before starting listeners
        signInAnonymously(auth);
        onAuthStateChanged(auth, (user) => {
            if (user) startListeners();
        });

        function startListeners() {
            // Forcea en re-render var 5:e sekund för att uppdatera offline-status på elever
            setInterval(() => {
                if(sessionData && sessionData.gameState !== 'finished') render();
            }, 5000);

            // Secret answers from private subcollection (only creator can read)
            onSnapshot(doc(db, "sessions", sessionPin, "private", "answers"), (docSnap) => {
                if(finalResults) return;
                if (docSnap.exists()) secretAnswers = docSnap.data().answers;
            });

            onSnapshot(doc(db, "sessions", sessionPin), (docSnap) => {
                if(finalResults) return;

                if (docSnap.exists()) {
                    sessionData = docSnap.data();

                    // FRYS SPELET & STÄDA DATABASEN
                    if (sessionData.gameState === 'finished') {
                        finalResults = calculateFinalResults();
                        render(); // Rendera sista skärmen från fryst data

                        // Vänta 5 sek, sen Ghost-städar vi databasen!
                        setTimeout(async () => {
                            try {
                                const batch = writeBatch(db);
                                playersData.forEach(p => batch.delete(doc(db, "sessions", sessionPin, "players", p.id)));
                                batch.delete(doc(db, "sessions", sessionPin, "private", "answers"));
                                batch.delete(doc(db, "sessions", sessionPin));
                                await batch.commit();
                                console.log("Databasen städades tyst i bakgrunden.");
                            } catch(e) {}
                        }, 5000);
                        return;
                    }
                    render();
                }
            });

            onSnapshot(collection(db, "sessions", sessionPin, "players"), (querySnapshot) => {
            if(finalResults) return; 
            
            playersData = [];
            querySnapshot.forEach((docSnap) => {
                const p = { id: docSnap.id, ...docSnap.data() };
                playersData.push(p);

                // Auto-rätta exakta svar
                if (sessionData && sessionData.gameState === 'playing' && secretAnswers.length > 0) {
                    const ans = p.answers?.[sessionData.currentBoardIndex];
                    const correctAns = secretAnswers[sessionData.currentBoardIndex].trim().toLowerCase();
                    if (ans && ans.locked && ans.correct === null) {
                        if (ans.text.trim().toLowerCase() === correctAns) markAnswer(p.id, true);
                        else markAnswer(p.id, false);
                    }
                }
            });
            render();
        });
        } // end startListeners

        function calculateFinalResults() {
            const activePlayers = playersData.filter(p => !p.banned);
            return sessionData.teams.map(team => {
                const tPlayers = activePlayers.filter(p => p.teamId === team.id);
                if(tPlayers.length === 0) return { ...team, score: 0, total: 0, players: [] };
                
                const totalPoints = tPlayers.reduce((sum, p) => sum + Object.values(p.answers || {}).reduce((s, a) => s + (a.points || 0), 0), 0);
                return { 
                    ...team, 
                    score: Math.round((totalPoints / tPlayers.length) * 10) / 10,
                    total: totalPoints,
                    players: tPlayers.map(p => p.name).join(', ')
                };
            }).sort((a,b) => b.score - a.score);
        }

        // --- ACTIONS ---
        window.copyPlayUrl = () => {
            navigator.clipboard.writeText(playUrl);
            const btn = document.getElementById('copyBtn');
            if(btn) {
                btn.innerText = "Kopierad!"; btn.classList.add("bg-emerald-100", "text-emerald-700", "border-emerald-300");
                setTimeout(() => { btn.innerText = "Kopiera Elevlänk"; btn.classList.remove("bg-emerald-100", "text-emerald-700", "border-emerald-300"); }, 2000);
            }
        };

        window.drag = (ev, playerId) => { ev.dataTransfer.setData("playerId", playerId); };
        window.allowDrop = (ev) => { ev.preventDefault(); ev.currentTarget.classList.add('drag-over'); };
        window.leaveDrop = (ev) => { ev.currentTarget.classList.remove('drag-over'); };
        window.drop = (ev, teamId) => {
            ev.preventDefault(); ev.currentTarget.classList.remove('drag-over');
            const playerId = ev.dataTransfer.getData("playerId");
            if(playerId) changeTeam(playerId, teamId === 'null' ? null : teamId);
        };

        window.randomizeTeams = async () => {
            const teamSize = parseInt(document.getElementById('teamSize').value) || 3;
            const activePlayers = playersData.filter(p => !p.banned);
            const shuffled = activePlayers.sort(() => 0.5 - Math.random());
            
            const numTeams = Math.ceil(shuffled.length / teamSize);
            const colors = ['#f59e0b', '#10b981', '#3b82f6', '#ec4899', '#8b5cf6', '#14b8a6', '#f43f5e', '#84cc16', '#0ea5e9', '#d946ef', '#eab308', '#06b6d4'];
            const adjs = ["Lustiga", "Galna", "Smarta", "Snabba", "Modiga", "Trötta", "Listiga", "Starka", "Kvicka", "Sköna", "Vilda", "Fina"].sort(() => 0.5 - Math.random());
            const nouns = ["Rävarna", "Bären", "Sengångarna", "Ugglorna", "Älgarna", "Örnarna", "Myrorna", "Vargarna", "Tigrarna", "Lodjuren", "Björnarna", "Hajarna"].sort(() => 0.5 - Math.random());

            const teams = Array.from({length: numTeams}, (_, i) => ({
                id: `team_${i}`, name: `${adjs[i % adjs.length]} ${nouns[i % nouns.length]}`, color: colors[i % colors.length]
            }));

            const batch = writeBatch(db);
            shuffled.forEach((p, index) => {
                const teamId = teams[index % numTeams].id;
                batch.update(doc(db, "sessions", sessionPin, "players", p.id), { teamId });
            });
            batch.update(doc(db, "sessions", sessionPin), { teams });
            await batch.commit();
        };

        window.changeTeam = async (playerId, newTeamId) => updateDoc(doc(db, "sessions", sessionPin, "players", playerId), { teamId: newTeamId });
        
        window.startGame = () => {
            // Filtrera bort tomma lag
            const activeTeams = sessionData.teams.filter(t => playersData.some(p => p.teamId === t.id && !p.banned));
            
            updateDoc(doc(db, "sessions", sessionPin), { 
                gameState: 'playing', 
                currentBoardIndex: 0, 
                currentClueIndex: 0,
                teams: activeTeams 
            });
        };

        window.nextClue = () => updateDoc(doc(db, "sessions", sessionPin), { currentClueIndex: Math.min(4, sessionData.currentClueIndex + 1) });
        window.revealAnswer = () => updateDoc(doc(db, "sessions", sessionPin), { gameState: 'revealing', revealedAnswer: secretAnswers[sessionData.currentBoardIndex] });
        
        window.markAnswer = async (playerId, status) => {
            const p = playersData.find(p => p.id === playerId);
            const ans = p.answers[sessionData.currentBoardIndex];
            let points = 0;
            
            if (status === true) {
                const basePoints = POINTS[ans.clueIndex];
                const unlockCount = ans.unlockCount || 0;
                points = Math.ceil(basePoints / Math.pow(2, unlockCount));
            }
            else if (status === 'minus') {
                points = -5; // Straffpoäng!
            }

            await updateDoc(doc(db, "sessions", sessionPin, "players", playerId), {
                [`answers.${sessionData.currentBoardIndex}.correct`]: status === true,
                [`answers.${sessionData.currentBoardIndex}.points`]: points,
                [`answers.${sessionData.currentBoardIndex}.status`]: status 
            });
        };

        window.nextQuestion = () => {
            if(sessionData.currentBoardIndex >= sessionData.boards.length - 1) {
                updateDoc(doc(db, "sessions", sessionPin), { gameState: 'finished' });
            } else {
                updateDoc(doc(db, "sessions", sessionPin), { gameState: 'playing', currentBoardIndex: sessionData.currentBoardIndex + 1, currentClueIndex: 0, revealedAnswer: null });
            }
        };

        window.banPlayer = async (playerId) => { if(confirm("Kick/Banna denna spelare?")) await updateDoc(doc(db, "sessions", sessionPin, "players", playerId), { banned: true }); };

        window.editPlayerName = async (playerId, currentName) => {
            const newName = prompt("Ändra namn på eleven:", currentName);
            if (newName && newName.trim().length > 0 && newName.trim().length <= 20) {
                try {
                    await updateDoc(doc(db, "sessions", sessionPin, "players", playerId), { 
                        name: newName.trim() 
                    });
                } catch (error) {
                    alert("Kunde inte uppdatera namnet. Kontrollera din anslutning.");
                }
            } else if (newName !== null) {
                alert("Ogiltigt namn. Det måste vara mellan 1-20 tecken.");
            }
        };

        window.endAndCleanup = async () => {
            window.location.href = "index.html"; 
        };

        // --- RENDER ---
        function render() {
            // Om vi har ett fryst slutresultat
            if (finalResults) {
                const appEl = document.getElementById('app');
                appEl.innerHTML = `
                    <div class="text-center mb-10">
                        <h2 class="text-6xl font-black text-slate-900 mb-4">Spelet är slut!</h2>
                        <p class="text-slate-500 font-bold text-lg mb-2">Resultattavla (Baserat på lagens snittpoäng)</p>
                    </div>
                    <div class="max-w-3xl mx-auto space-y-4">
                        ${finalResults.map((t, i) => `
                            <div class="flex items-center justify-between bg-white p-6 rounded-2xl border-2 ${i===0 ? 'border-amber-400 shadow-[6px_6px_0px_0px_#fbbf24]' : 'border-slate-200 shadow-sm'}">
                                <div class="flex items-center gap-6">
                                    <span class="text-4xl font-black ${i===0 ? 'text-amber-500' : 'text-slate-400'}">#${i+1}</span>
                                    <div>
                                        <h3 class="text-2xl font-black" style="color: ${t.color}">${t.name}</h3>
                                        <p class="text-sm font-semibold text-slate-500 mt-1">${t.players}</p>
                                    </div>
                                </div>
                                <span class="text-4xl font-black text-slate-900">${t.score} <span class="text-lg text-slate-500">p</span></span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="text-center mt-12">
                        <button onclick="window.location.href='index.html'" class="px-8 py-3 bg-slate-100 text-slate-600 border border-slate-300 hover:bg-slate-200 font-bold rounded-lg transition">Tillbaka till startsidan</button>
                    </div>
                `;
                return; 
            }

            if (!sessionData) return;
            const appEl = document.getElementById('app');

            // --- NY KOD: Spara nuvarande fokus och värde för teamSize ---
            const activeId = document.activeElement ? document.activeElement.id : null;
            const teamSizeInputEl = document.getElementById('teamSize');
            const savedTeamSize = teamSizeInputEl ? teamSizeInputEl.value : '3';
            // -----------------------------------------------------------

            const activePlayers = playersData.filter(p => !p.banned);
            const now = Date.now();
            let html = '';

            // Lobbyns unika header eller en slimmad i spelläge
            if (sessionData.gameState !== 'lobby') {
                html += `<div class="absolute top-4 left-4 bg-slate-100 text-slate-400 px-3 py-1 rounded-md text-xs font-bold border border-slate-200">PIN: ${sessionPin}</div>`;
            } else {
                html += `
                    <header class="flex justify-between items-center mb-6 bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-sm">
                        <div>
                            <p class="text-slate-500 font-bold uppercase tracking-wider text-sm mb-1">Gå till spelet via</p>
                            <div class="flex items-center gap-2 mt-1">
                                <input type="text" readonly value="${playUrl}" class="bg-white border border-slate-300 font-medium text-sm px-3 py-1.5 w-64 rounded-md text-slate-700 outline-none">
                                <button id="copyBtn" onclick="copyPlayUrl()" class="px-4 py-1.5 bg-white border border-slate-300 rounded-md shadow-sm text-sm font-bold hover:bg-slate-50 transition">Kopiera Elevlänk</button>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Elever anslutna</p>
                            <p class="text-4xl font-black text-slate-800">${activePlayers.length}</p>
                        </div>
                    </header>
                `;
            }

            if (sessionData.gameState === 'lobby') {
                const unassigned = activePlayers.filter(p => !p.teamId);
                html += `
                    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                        <div class="lg:col-span-1 flex flex-col gap-4">
                            <div class="bg-white p-4 rounded-xl border border-slate-300 shadow-sm">
                                <h2 class="font-black text-lg mb-3">Laginställningar</h2>
                                <label class="block text-xs font-bold text-slate-500 mb-1">Max elever per lag</label>
                                <div class="flex gap-2">
                                    <input type="number" id="teamSize" value="${savedTeamSize}" class="w-16 bg-slate-50 border border-slate-300 rounded p-2 text-sm font-bold outline-none focus:border-amber-500 text-center">
                                    <button onclick="randomizeTeams()" class="flex-1 bg-slate-800 hover:bg-slate-900 text-white font-bold py-2 rounded transition text-sm">Slumpa Lagen</button>
                                </div>
                            </div>

                            <div class="bg-white p-4 rounded-xl border border-slate-300 shadow-sm flex flex-col flex-1 min-h-[300px]"
                                 ondrop="drop(event, 'null')" ondragover="allowDrop(event)" ondragleave="leaveDrop(event)">
                                <div class="flex justify-between items-center mb-2">
                                    <h2 class="font-black text-lg">Väntrum (${unassigned.length})</h2>
                                </div>
                                <p class="text-xs text-slate-400 mb-3">Dra och släpp elever för att byta lag.</p>
                                
                                <div class="space-y-1.5 flex-1 overflow-y-auto pr-1">
                                    ${unassigned.map(p => {
                                        const isOnline = (now - (p.lastActive || now)) < 15000;
                                        const safeName = p.name.replace(/'/g, "&#39;");
                                        return `
                                        <div draggable="true" ondragstart="drag(event, '${p.id}')" class="flex justify-between items-center bg-slate-50 hover:bg-slate-100 p-2 rounded-md border border-slate-200 text-sm cursor-grab active:cursor-grabbing ${isOnline ? '' : 'opacity-50'}">
                                            <span class="font-bold truncate pointer-events-none ${isOnline ? '' : 'line-through text-slate-400'}" title="${isOnline ? '' : 'Offline'}">${p.name}</span>
                                            <div class="flex items-center gap-1 shrink-0">
                                                <button onclick="editPlayerName('${p.id}', '${safeName}')" title="Ändra namn" class="text-slate-400 hover:text-blue-500 hover:bg-blue-50 px-1.5 rounded transition">✏️</button>
                                                <button onclick="banPlayer('${p.id}')" title="Kicka spelare" class="text-red-500 hover:text-red-700 hover:bg-red-50 px-1.5 rounded font-bold">&times;</button>
                                            </div>
                                        </div>
                                        `;
                                    }).join('') || '<p class="text-slate-400 text-sm italic">Inga väntande elever...</p>'}
                                </div>
                            </div>
                        </div>

                        <div class="lg:col-span-3 bg-slate-50 p-4 rounded-xl border border-slate-200 flex flex-col">
                            <div class="flex justify-between items-center mb-4">
                                <h2 class="text-xl font-black">Lagöversikt</h2>
                                ${sessionData.teams?.length > 0 ? `<button onclick="startGame()" class="bg-amber-400 hover:bg-amber-500 text-slate-900 font-black py-2 px-6 rounded-lg transition shadow-sm">Starta Spelet</button>` : ''}
                            </div>
                            
                            ${sessionData.teams?.length > 0 ? `
                                <div class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4 overflow-y-auto p-1">
                                    ${sessionData.teams.map(team => {
                                        const teamPlayers = activePlayers.filter(p => p.teamId === team.id);
                                        return `
                                            <div ondrop="drop(event, '${team.id}')" ondragover="allowDrop(event)" ondragleave="leaveDrop(event)" 
                                                 class="border-t-4 bg-white rounded-md shadow-sm border-x border-b border-slate-200 p-3 min-h-[100px] flex flex-col" 
                                                 style="border-top-color: ${team.color}">
                                                <h3 class="font-black text-sm mb-3 text-slate-800 truncate" title="${team.name}">${team.name}</h3>
                                                <div class="space-y-1.5 flex-1">
                                                    ${teamPlayers.map(p => {
                                                        const isOnline = (now - (p.lastActive || now)) < 15000;
                                                        const safeName = p.name.replace(/'/g, "&#39;");
                                                        return `
                                                        <div draggable="true" ondragstart="drag(event, '${p.id}')" class="flex justify-between items-center text-xs font-semibold ${isOnline ? 'text-slate-700 bg-slate-50' : 'text-slate-400 bg-slate-100 line-through'} border border-slate-100 rounded px-2 py-1 cursor-grab active:cursor-grabbing" title="${isOnline ? '' : 'Offline'}">
                                                            <span class="truncate pointer-events-none">${p.name}</span>
                                                            <div class="flex items-center gap-1 shrink-0">
                                                                <button onclick="editPlayerName('${p.id}', '${safeName}')" title="Ändra namn" class="text-slate-400 hover:text-blue-500 hover:bg-blue-50 px-1 rounded transition">✏️</button>
                                                            </div>
                                                        </div>
                                                    `;
                                                    }).join('') || '<span class="text-xs text-slate-400">Dra spelare hit</span>'}
                                                </div>
                                            </div>
                                        `;
                                    }).join('')}
                                </div>
                            ` : `<div class="flex-1 flex items-center justify-center text-slate-400 text-sm">Inga lag skapade ännu.</div>`}
                        </div>
                    </div>
                `;
            } 
            else if (sessionData.gameState === 'playing') {
                const currentBoard = sessionData.boards[sessionData.currentBoardIndex];
                html += `
                    <div class="text-center mb-10">
                        <p class="text-slate-500 font-bold uppercase text-xs mb-2 tracking-widest">Fråga ${sessionData.currentBoardIndex + 1} av ${sessionData.boards.length}</p>
                        <div class="bg-white border-2 border-slate-900 rounded-xl p-6 mb-4 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)]">
                            <p class="text-amber-500 text-sm font-black mb-2 uppercase">Ledtråd ${sessionData.currentClueIndex + 1} &mdash; ${POINTS[sessionData.currentClueIndex]} poäng</p>
                            <h2 class="text-3xl font-black text-slate-800 leading-tight">${currentBoard.clues[sessionData.currentClueIndex]}</h2>
                        </div>
                        <div class="flex justify-center gap-3">
                            ${sessionData.currentClueIndex < 4 ? `<button onclick="nextClue()" class="px-6 py-2 bg-slate-100 border border-slate-300 hover:bg-slate-200 text-slate-700 font-bold rounded-lg transition text-sm shadow-sm">Nästa ledtråd</button>` : ''}
                            <button onclick="revealAnswer()" class="px-6 py-2 bg-amber-400 hover:bg-amber-500 text-slate-900 font-bold rounded-lg transition shadow-sm text-sm">Lås spelet & Visa facit</button>
                        </div>
                    </div>

                    <div class="bg-slate-50 p-6 rounded-xl border border-slate-300 shadow-sm">
                        <h3 class="text-lg font-black mb-4 text-slate-700">Status: Vilka har låst?</h3>
                        <div class="grid grid-cols-3 sm:grid-cols-4 lg:grid-cols-6 gap-3">
                            ${sessionData.teams.map(team => {
                                const teamPlayers = activePlayers.filter(p => p.teamId === team.id);
                                
                                // Räkna bara förväntade svar om spelaren är online ELLER redan har låst
                                const expectedPlayers = teamPlayers.filter(p => {
                                    const isOnline = (now - (p.lastActive || 0)) < 15000;
                                    const hasLocked = p.answers?.[sessionData.currentBoardIndex]?.locked;
                                    return isOnline || hasLocked;
                                });

                                const lockedCount = expectedPlayers.filter(p => p.answers?.[sessionData.currentBoardIndex]?.locked).length;
                                const expectedCount = expectedPlayers.length;
                                const missing = expectedPlayers.filter(p => !p.answers?.[sessionData.currentBoardIndex]?.locked).map(p=>p.name).join(', ');
                                
                                const fillRatio = expectedCount ? (lockedCount / expectedCount) * 100 : 0;
                                const isDone = lockedCount === expectedCount && expectedCount > 0;
                                
                                return `
                                    <div title="${missing ? 'Väntar på: ' + missing : 'Laget är klart/Fullt'}" 
                                         class="relative overflow-hidden p-3 rounded-lg border border-slate-200 shadow-sm cursor-help"
                                         style="background: linear-gradient(to top, ${team.color}33 ${fillRatio}%, white ${fillRatio}%)">
                                        <div class="relative z-10">
                                            <h4 class="font-bold text-xs truncate text-slate-700">${team.name}</h4>
                                            <p class="text-xl font-black ${isDone ? 'text-emerald-600' : 'text-slate-800'}">${lockedCount}/${expectedCount}</p>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }
            else if (sessionData.gameState === 'revealing') {
                const correctAns = secretAnswers[sessionData.currentBoardIndex];
                html += `
                    <div class="text-center mb-8">
                        <p class="text-slate-400 font-bold uppercase text-xs mb-1">Rätt svar var</p>
                        <h2 class="text-4xl font-black text-emerald-600 mb-6">${correctAns}</h2>
                        <button onclick="nextQuestion()" class="px-8 py-3 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-lg shadow-md transition">Gå vidare till nästa</button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                        ${sessionData.teams.map(team => {
                            const teamPlayers = activePlayers.filter(p => p.teamId === team.id);
                            return `
                                <div class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm">
                                    <h4 class="font-black text-sm mb-2" style="color: ${team.color}">${team.name}</h4>
                                    <div class="space-y-2">
                                        ${teamPlayers.map(p => {
                                            const ans = p.answers?.[sessionData.currentBoardIndex];
                                            if(!ans) return `<div class="text-xs text-slate-400 flex justify-between bg-slate-50 p-2 border border-slate-100 rounded"><span class="font-bold">${p.name}</span> Inget svar</div>`;
                                            
                                            let actions = '';
                                            if(ans.correct === true) actions = `<span class="text-emerald-600 font-bold px-2">+${ans.points}p</span>`;
                                            else if(ans.correct === false && ans.status !== 'minus') actions = `<span class="text-red-500 font-bold px-2">0p</span>`;
                                            else if(ans.status === 'minus') actions = `<span class="text-slate-800 font-bold px-2">-5p</span>`;
                                            
                                            // Knappar för läraren att korrigera
                                            actions += `
                                                <div class="flex gap-1 ml-2 border-l border-slate-200 pl-2">
                                                    <button onclick="markAnswer('${p.id}', true)" title="Ge Rätt" class="bg-emerald-100 text-emerald-700 px-2 py-1 rounded text-sm hover:bg-emerald-200 transition">🟢</button>
                                                    <button onclick="markAnswer('${p.id}', false)" title="Ge Fel (0p)" class="bg-red-100 text-red-700 px-2 py-1 rounded text-sm hover:bg-red-200 transition">🔴</button>
                                                    <button onclick="markAnswer('${p.id}', 'minus')" title="Ge Minuspoäng (-5p) för olämpligt svar" class="bg-slate-200 text-slate-800 px-2 py-1 rounded text-sm hover:bg-slate-300 transition">💀</button>
                                                </div>
                                            `;

                                            const basePoints = POINTS[ans.clueIndex];
                                            const unlockCount = ans.unlockCount || 0;
                                            const displayPoints = Math.ceil(basePoints / Math.pow(2, unlockCount));
                                            const penaltyBadge = unlockCount > 0 ? `<span class="text-red-500 bg-red-100 px-1 rounded text-[10px] ml-1 font-bold" title="Svaret låstes upp ${unlockCount} gånger">÷${Math.pow(2, unlockCount)}</span>` : '';

                                            return `
                                                <div class="flex justify-between items-center bg-slate-50 p-2 rounded border border-slate-100">
                                                    <div class="truncate mr-2">
                                                        <p class="font-bold text-xs text-slate-800 truncate">${p.name} ${penaltyBadge}</p>
                                                        <p class="text-xs text-slate-500 truncate">"${ans.text}" <span class="opacity-50">(${displayPoints}p max)</span></p>
                                                    </div>
                                                    <div class="flex items-center">
                                                        ${actions}
                                                    </div>
                                                </div>
                                            `;
                                        }).join('')}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
            }
            appEl.innerHTML = html;

            // --- NY KOD: Återställ fokus om läraren höll på att skriva i number-fältet ---
            if (activeId === 'teamSize') {
                const newTeamSizeInput = document.getElementById('teamSize');
                if (newTeamSizeInput) {
                    newTeamSizeInput.focus();
                    // Sätt markören på rätt ställe så att det inte hackar när man raderar
                    if(newTeamSizeInput.type !== 'number') {
                        newTeamSizeInput.selectionStart = newTeamSizeInput.value.length;
                        newTeamSizeInput.selectionEnd = newTeamSizeInput.value.length;
                    }
                }
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>På Rätt Spår</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans flex flex-col">

    <div id="app" class="flex-1 flex flex-col p-6 max-w-lg w-full mx-auto justify-center">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, doc, collection, onSnapshot, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const app = initializeApp({
            apiKey: "AIzaSyCZGQi85oGYum0mnUowUcw4QMt3tyoHK1U",
            authDomain: "on-track-d77d0.firebaseapp.com",
            projectId: "on-track-d77d0",
            storageBucket: "on-track-d77d0.firebasestorage.app",
            messagingSenderId: "515234485983",
            appId: "1:515234485983:web:daa02d8bbc09e30a65fb6a"
        });
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const sessionPin = urlParams.get('session');
        let playerId = localStorage.getItem(`pa_sparet_player_${sessionPin}`);

        if (!sessionPin) {
            document.body.innerHTML = '<h1 class="text-center mt-20 text-xl">Ingen session angiven i URL.</h1>';
        }

        let sessionData = null;
        let playerData = null;
        const POINTS = [10, 8, 6, 4, 2];

        // Lyssna på Session
        if(sessionPin) {
            onSnapshot(doc(db, "sessions", sessionPin), (docSnap) => {
                if (docSnap.exists()) {
                    sessionData = docSnap.data();
                    render();
                } else {
                    document.getElementById('app').innerHTML = '<h1 class="text-center text-red-400">Sessionen finns inte.</h1>';
                }
            });
        }

        // Lyssna på sig själv (om man anslutit)
        if (playerId && sessionPin) {
            listenToPlayer();
        }

        function listenToPlayer() {
            onSnapshot(doc(db, "sessions", sessionPin, "players", playerId), (docSnap) => {
                if (docSnap.exists()) {
                    playerData = docSnap.data();
                    if(playerData.banned) {
                        localStorage.removeItem(`pa_sparet_player_${sessionPin}`);
                        document.getElementById('app').innerHTML = '<h1 class="text-center text-red-500 font-bold text-2xl">Du har blivit utkastad från spelet.</h1>';
                        return;
                    }
                    render();
                }
            });
        }

        // --- ACTIONS ---
        window.joinGame = async (e) => {
            e.preventDefault();
            const name = document.getElementById('playerName').value.trim();
            if(!name) return;

            document.getElementById('joinBtn').innerText = "Ansluter...";
            try {
                const docRef = await addDoc(collection(db, "sessions", sessionPin, "players"), {
                    name: name,
                    teamId: null,
                    banned: false,
                    answers: {}
                });
                playerId = docRef.id;
                localStorage.setItem(`pa_sparet_player_${sessionPin}`, playerId);
                listenToPlayer();
            } catch(err) {
                alert("Kunde inte ansluta.");
            }
        };

        window.lockAnswer = async (e) => {
            e.preventDefault();
            const answerText = document.getElementById('answerInput').value.trim();
            if(!answerText) return;

            document.getElementById('lockBtn').innerText = "Låser...";
            try {
                await updateDoc(doc(db, "sessions", sessionPin, "players", playerId), {
                    [`answers.${sessionData.currentBoardIndex}`]: {
                        text: answerText,
                        clueIndex: sessionData.currentClueIndex,
                        locked: true,
                        correct: null,
                        points: 0
                    }
                });
            } catch(err) {
                alert("Kunde inte låsa svaret!");
            }
        };

        // --- RENDER ---
        function render() {
            if (!sessionData) return;
            const appEl = document.getElementById('app');

            if (!playerId || !playerData) {
                appEl.innerHTML = `
                    <div class="text-center mb-8">
                        <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-500 mb-2">På Rätt Spår</h1>
                        <p class="text-slate-400">Skriv in ditt namn för att vara med</p>
                    </div>
                    <form onsubmit="joinGame(event)" class="space-y-4">
                        <input type="text" id="playerName" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-xl text-center text-white focus:border-amber-500 focus:outline-none" placeholder="Ditt namn..." required maxlength="20">
                        <button type="submit" id="joinBtn" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-900 font-black text-lg py-4 rounded-xl shadow-lg transition">Gå med i spelet</button>
                    </form>
                `;
                return;
            }

            // Spelarens lag
            const myTeam = sessionData.teams?.find(t => t.id === playerData.teamId);
            const teamBadge = myTeam 
                ? `<div class="px-3 py-1 rounded-full text-xs font-bold mb-6 mx-auto w-max" style="background-color: ${myTeam.color}20; color: ${myTeam.color}; border: 1px solid ${myTeam.color}40">${myTeam.name}</div>` 
                : '';

            if (sessionData.gameState === 'lobby') {
                appEl.innerHTML = `
                    <div class="text-center">
                        ${teamBadge}
                        <h2 class="text-3xl font-black text-white mb-4">Välkommen ${playerData.name}!</h2>
                        <p class="text-slate-400">Invänta spelledaren...</p>
                        <div class="mt-8 w-12 h-12 border-4 border-amber-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
                    </div>
                `;
            }
            else if (sessionData.gameState === 'playing') {
                const currentBoard = sessionData.boards[sessionData.currentBoardIndex];
                const activeClueIndex = sessionData.currentClueIndex;
                const myAnswer = playerData.answers?.[sessionData.currentBoardIndex];

                // Rulla ut de ledtrådar som visats hittills
                let cluesHtml = '';
                for(let i=0; i <= activeClueIndex; i++) {
                    cluesHtml += `
                        <div class="bg-slate-800 p-4 rounded-lg border border-slate-700 mb-3 shadow-md">
                            <span class="inline-block bg-slate-700 text-amber-400 text-xs font-bold px-2 py-1 rounded mb-2">${POINTS[i]} poäng</span>
                            <p class="text-lg font-medium">${currentBoard.clues[i]}</p>
                        </div>
                    `;
                }

                if (myAnswer?.locked) {
                    appEl.innerHTML = `
                        <div class="text-center">
                            ${teamBadge}
                            <p class="text-emerald-400 font-bold mb-2">Svar låst!</p>
                            <h2 class="text-2xl font-black text-white mb-6">"${myAnswer.text}"</h2>
                            <p class="text-slate-400 text-sm">Du låste på ${POINTS[myAnswer.clueIndex]} poäng-nivån.</p>
                            <p class="text-slate-500 text-sm mt-4">Väntar på att alla ska svara...</p>
                        </div>
                    `;
                } else {
                    appEl.innerHTML = `
                        ${teamBadge}
                        <div class="flex-1 overflow-y-auto mb-6 pb-4">
                            ${cluesHtml}
                        </div>
                        <form onsubmit="lockAnswer(event)" class="bg-slate-800 p-4 rounded-xl border border-slate-700 sticky bottom-0">
                            <input type="text" id="answerInput" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white focus:border-amber-500 focus:outline-none mb-3" placeholder="Skriv ditt svar här..." required>
                            <button type="submit" id="lockBtn" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-black text-lg py-3 rounded-lg shadow-lg transition">Lås Svar</button>
                        </form>
                    `;
                }
            }
            else if (sessionData.gameState === 'revealing') {
                const myAnswer = playerData.answers?.[sessionData.currentBoardIndex];
                const currentBoard = sessionData.boards[sessionData.currentBoardIndex];
                
                let resultHtml = '';
                if(!myAnswer) {
                    resultHtml = `<p class="text-slate-400 font-bold text-xl">Inget svar inskickat.</p>`;
                } else if (myAnswer.correct === null) {
                    resultHtml = `<p class="text-amber-400 font-bold text-xl animate-pulse">Läraren rättar...</p>`;
                } else if (myAnswer.correct === true) {
                    resultHtml = `<p class="text-emerald-400 font-black text-3xl mb-2">Rätt!</p>
                                  <p class="text-emerald-300 font-bold">+${myAnswer.points} poäng</p>`;
                } else {
                    resultHtml = `<p class="text-red-400 font-black text-3xl mb-2">Fel tyvärr!</p>`;
                }

                appEl.innerHTML = `
                    <div class="text-center">
                        ${teamBadge}
                        <p class="text-slate-400 font-bold uppercase mb-2">Rätt svar</p>
                        <h2 class="text-4xl font-black text-white mb-12">${currentBoard.answer}</h2>
                        
                        <div class="bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-xl">
                            ${myAnswer ? `<p class="text-slate-400 text-sm mb-2">Ditt svar: "${myAnswer.text}"</p>` : ''}
                            ${resultHtml}
                        </div>
                    </div>
                `;
            }
            else if (sessionData.gameState === 'finished') {
                // Summera individuella poäng
                const myTotalPoints = Object.values(playerData.answers || {}).reduce((sum, ans) => sum + (ans.points || 0), 0);
                
                appEl.innerHTML = `
                    <div class="text-center">
                        ${teamBadge}
                        <h2 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-500 mb-6">Bra kämpat!</h2>
                        <div class="bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-xl">
                            <p class="text-slate-400 font-bold uppercase mb-2">Du samlade ihop</p>
                            <p class="text-6xl font-black text-white">${myTotalPoints} p</p>
                        </div>
                        <p class="text-slate-500 mt-8 text-sm">Se den stora skärmen för lagens totala placering!</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>

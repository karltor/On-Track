<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>På Rätt Spår - Spelare</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans flex flex-col">

    <div id="app" class="flex-1 flex flex-col p-6 max-w-lg w-full mx-auto justify-center">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, doc, collection, onSnapshot, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const app = initializeApp({
            apiKey: "AIzaSyCZGQi85oGYum0mnUowUcw4QMt3tyoHK1U",
            authDomain: "on-track-d77d0.firebaseapp.com",
            projectId: "on-track-d77d0"
        });
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const sessionPin = urlParams.get('session');
        let playerId = localStorage.getItem(`pa_sparet_player_${sessionPin}`);

        if (!sessionPin) {
            document.body.innerHTML = '<h1 class="text-center mt-20 text-xl font-bold">Ingen PIN-kod angiven i länk.</h1>';
        }

        let sessionData = null;
        let allPlayers = []; // Nu sparar vi alla spelare!
        let playerData = null;
        const POINTS = [10, 8, 6, 4, 2];

        if(sessionPin) {
            onSnapshot(doc(db, "sessions", sessionPin), (docSnap) => {
                if (docSnap.exists()) {
                    sessionData = docSnap.data();
                    render();
                } else {
                    document.getElementById('app').innerHTML = '<h1 class="text-center text-red-400 font-bold text-2xl">Sessionen finns inte.</h1>';
                }
            });
        }

        if (sessionPin) {
            // Vi lyssnar på ALLA spelare i rummet
            onSnapshot(collection(db, "sessions", sessionPin, "players"), (snap) => {
                allPlayers = [];
                snap.forEach(doc => allPlayers.push({id: doc.id, ...doc.data()}));
                
                if(playerId) {
                    playerData = allPlayers.find(p => p.id === playerId);
                    if(playerData?.banned) {
                        localStorage.removeItem(`pa_sparet_player_${sessionPin}`);
                        document.getElementById('app').innerHTML = '<h1 class="text-center text-red-500 font-black text-3xl mt-20">Utkastad</h1><p class="text-center text-slate-400 mt-2">Du har blivit borttagen från spelet.</p>';
                        return;
                    }
                }
                render();
            });
        }

        window.joinGame = async (e) => {
            e.preventDefault();
            const name = document.getElementById('playerName').value.trim();
            if(!name) return;

            document.getElementById('joinBtn').innerText = "Ansluter...";
            try {
                const docRef = await addDoc(collection(db, "sessions", sessionPin, "players"), {
                    name: name,
                    teamId: null,
                    banned: false,
                    answers: {}
                });
                playerId = docRef.id;
                localStorage.setItem(`pa_sparet_player_${sessionPin}`, playerId);
            } catch(err) {
                alert("Kunde inte ansluta.");
                document.getElementById('joinBtn').innerText = "Gå med i spelet";
            }
        };

        window.lockAnswer = async (e) => {
            e.preventDefault();
            const answerText = document.getElementById('answerInput').value.trim();
            if(!answerText) return;

            document.getElementById('lockBtn').innerText = "Låser...";
            try {
                await updateDoc(doc(db, "sessions", sessionPin, "players", playerId), {
                    [`answers.${sessionData.currentBoardIndex}`]: {
                        text: answerText,
                        clueIndex: sessionData.currentClueIndex,
                        locked: true,
                        correct: null,
                        points: 0
                    }
                });
            } catch(err) {
                alert("Kunde inte låsa svaret!");
                document.getElementById('lockBtn').innerText = "Lås Svar";
            }
        };

        function render() {
            if (!sessionData) return;
            const appEl = document.getElementById('app');

            if (!playerId || !playerData) {
                appEl.innerHTML = `
                    <div class="text-center mb-8">
                        <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-500 mb-2">På Rätt Spår</h1>
                        <p class="text-slate-400 font-medium">Skriv in ditt namn för att vara med</p>
                    </div>
                    <form onsubmit="joinGame(event)" class="space-y-4">
                        <input type="text" id="playerName" class="w-full bg-slate-800 border-2 border-slate-700 rounded-xl p-4 text-xl text-center text-white focus:border-amber-500 focus:outline-none transition-colors" placeholder="Ditt namn..." required maxlength="20">
                        <button type="submit" id="joinBtn" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-900 font-black text-lg py-4 rounded-xl shadow-lg transition-transform active:scale-95">Gå med i spelet</button>
                    </form>
                `;
                return;
            }

            const myTeam = sessionData.teams?.find(t => t.id === playerData.teamId);
            let teamHtml = '';

            if (myTeam) {
                // Hitta lagkamrater (exkludera en själv)
                const teamMates = allPlayers.filter(p => p.teamId === myTeam.id && p.id !== playerId);
                const matesText = teamMates.length > 0 
                    ? `Med: ${teamMates.map(m => m.name).join(', ')}` 
                    : 'Du är ensam i detta lag än så länge.';

                teamHtml = `
                    <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700 mb-6 text-center shadow-sm">
                        <p class="text-xs text-slate-400 font-bold uppercase tracking-wider mb-1">Ditt Lag</p>
                        <p class="font-black text-xl mb-1" style="color: ${myTeam.color}">${myTeam.name}</p>
                        <p class="text-xs text-slate-300">${matesText}</p>
                    </div>
                `;
            }

            if (sessionData.gameState === 'lobby') {
                appEl.innerHTML = `
                    <div class="text-center flex-1 flex flex-col justify-center">
                        ${teamHtml}
                        <h2 class="text-3xl font-black text-white mb-2">Välkommen ${playerData.name}!</h2>
                        <p class="text-slate-400 font-medium">Titta upp på skärmen och invänta spelledaren...</p>
                        <div class="mt-8 w-12 h-12 border-4 border-amber-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
                    </div>
                `;
            }
            else if (sessionData.gameState === 'playing') {
                const currentBoard = sessionData.boards[sessionData.currentBoardIndex];
                const activeClueIndex = sessionData.currentClueIndex;
                const myAnswer = playerData.answers?.[sessionData.currentBoardIndex];

                let cluesHtml = '';
                for(let i=0; i <= activeClueIndex; i++) {
                    cluesHtml += `
                        <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 mb-3 shadow-sm">
                            <span class="inline-block bg-slate-900 text-amber-500 text-xs font-black px-2 py-1 rounded mb-2 uppercase tracking-wider">${POINTS[i]} poäng</span>
                            <p class="text-lg font-bold text-white">${currentBoard.clues[i]}</p>
                        </div>
                    `;
                }

                if (myAnswer?.locked) {
                    appEl.innerHTML = `
                        <div class="text-center flex-1 flex flex-col justify-center">
                            ${teamHtml}
                            <div class="bg-slate-800 border-2 border-emerald-500/50 p-6 rounded-2xl shadow-lg">
                                <p class="text-emerald-400 font-black uppercase tracking-wider text-sm mb-2">Svar inskickat!</p>
                                <h2 class="text-3xl font-black text-white mb-2">"${myAnswer.text}"</h2>
                                <p class="text-slate-400 text-sm font-medium">Låst för <span class="text-amber-400 font-bold">${POINTS[myAnswer.clueIndex]}p</span></p>
                            </div>
                            <p class="text-slate-500 text-sm mt-8 font-medium animate-pulse">Väntar på att facit ska avslöjas...</p>
                        </div>
                    `;
                } else {
                    appEl.innerHTML = `
                        ${teamHtml}
                        <div class="flex-1 overflow-y-auto mb-6 pb-4">
                            ${cluesHtml}
                        </div>
                        <form onsubmit="lockAnswer(event)" class="bg-slate-800 p-4 rounded-2xl border border-slate-700 sticky bottom-0 shadow-[0_-10px_20px_rgba(0,0,0,0.2)]">
                            <input type="text" id="answerInput" class="w-full bg-slate-900 border-2 border-slate-600 rounded-xl p-4 text-white font-bold text-lg focus:border-amber-500 focus:outline-none mb-3 transition-colors" placeholder="Skriv ditt svar här..." required>
                            <button type="submit" id="lockBtn" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-black text-lg py-4 rounded-xl shadow-lg transition-transform active:scale-95">Lås in mitt svar!</button>
                        </form>
                    `;
                }
            }
            else if (sessionData.gameState === 'revealing') {
                const myAnswer = playerData.answers?.[sessionData.currentBoardIndex];
                const currentBoard = sessionData.boards[sessionData.currentBoardIndex];
                
                let resultHtml = '';
                if(!myAnswer) {
                    resultHtml = `<p class="text-slate-400 font-black text-xl">Du svarade tyvärr inte.</p>`;
                } else if (myAnswer.correct === null) {
                    resultHtml = `<p class="text-amber-400 font-black text-xl animate-pulse">Läraren rättar ditt svar...</p>`;
                } else if (myAnswer.correct === true) {
                    resultHtml = `<p class="text-emerald-400 font-black text-4xl mb-1">RÄTT!</p>
                                  <p class="text-emerald-500 font-bold text-lg">+${myAnswer.points} poäng till laget</p>`;
                } else {
                    resultHtml = `<p class="text-red-400 font-black text-4xl mb-1">FEL!</p>
                                  <p class="text-red-500 font-bold text-lg">0 poäng</p>`;
                }

                appEl.innerHTML = `
                    <div class="text-center flex-1 flex flex-col justify-center">
                        ${teamHtml}
                        <p class="text-slate-400 font-bold uppercase tracking-widest text-sm mb-2">Rätt svar var</p>
                        <h2 class="text-5xl font-black text-white mb-10 drop-shadow-md">${currentBoard.answer}</h2>
                        
                        <div class="bg-slate-800 p-8 rounded-3xl border-2 border-slate-700 shadow-xl relative overflow-hidden">
                            ${myAnswer ? `<p class="text-slate-400 font-bold text-sm mb-4">Du skrev: <span class="text-white">"${myAnswer.text}"</span></p>` : ''}
                            ${resultHtml}
                        </div>
                    </div>
                `;
            }
            else if (sessionData.gameState === 'finished') {
                const myTotalPoints = Object.values(playerData.answers || {}).reduce((sum, ans) => sum + (ans.points || 0), 0);
                
                appEl.innerHTML = `
                    <div class="text-center flex-1 flex flex-col justify-center">
                        ${teamHtml}
                        <h2 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-500 mb-8">Bra kämpat!</h2>
                        <div class="bg-slate-800 p-8 rounded-3xl border border-slate-700 shadow-xl">
                            <p class="text-slate-400 font-bold uppercase tracking-widest text-sm mb-2">Du drog in</p>
                            <p class="text-7xl font-black text-white">${myTotalPoints} <span class="text-3xl text-slate-500">p</span></p>
                            <p class="text-slate-400 font-bold text-sm mt-4">åt ditt lag</p>
                        </div>
                        <p class="text-slate-500 mt-10 font-bold text-sm">Se den stora skärmen för lagens placeringar!</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>På Rätt Spår</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans flex flex-col selection:bg-amber-500 selection:text-slate-900 overflow-x-hidden relative">

    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl transform translate-y-24 opacity-0 transition-all duration-300 z-[100] font-bold text-sm flex items-center gap-3 pointer-events-none border border-slate-700">
        <span id="toastIcon">✨</span>
        <span id="toastMsg">Meddelande</span>
    </div>

    <div id="app" class="flex-1 flex flex-col p-4 md:p-8 max-w-6xl w-full mx-auto justify-center">
        <div class="flex justify-center"><div class="w-10 h-10 border-4 border-amber-500 border-t-transparent rounded-full animate-spin"></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, doc, collection, onSnapshot, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        const app = initializeApp({
            apiKey: "AIzaSyCZGQi85oGYum0mnUowUcw4QMt3tyoHK1U",
            authDomain: "on-track-d77d0.firebaseapp.com",
            projectId: "on-track-d77d0"
        });
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const sessionPin = urlParams.get('session');
        let playerId = localStorage.getItem(`pa_sparet_player_${sessionPin}`);

        window.showToast = (msg, icon = "✨") => {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            document.getElementById('toastIcon').innerText = icon;
            t.classList.remove('translate-y-24', 'opacity-0');
            setTimeout(() => t.classList.add('translate-y-24', 'opacity-0'), 3500);
        };

        if (!sessionPin) {
            document.getElementById('app').innerHTML = '<h1 class="text-center text-red-400 font-bold text-xl">Ingen PIN-kod angiven i länk.</h1>';
        }

        let sessionData = null;
        let allPlayers = [];
        let playerData = null;
        let finalResults = null;
        const POINTS = [10, 8, 6, 4, 2];

        // --- TÅG MINIGAME LOGIK ---
        let gameScore = 0;
        let highScore = parseInt(localStorage.getItem('train_hs')) || 0;
        let globalT = 0; 
        let trackSwitch = "blue"; 
        let activePath = "blue"; 
        let obstacle = { pos: 2.0, x: 600, y: 70 }; 
        // FIX: Minskat baseSpeed med ca 1/3
        let baseSpeed = 0.013; 
        let speed = baseSpeed;
        let gameLoopId;

        window.toggleSwitch = () => {
            trackSwitch = trackSwitch === "blue" ? "yellow" : "blue";
            const btn = document.getElementById('switchBtn');
            if(btn) {
                btn.className = `w-full py-4 border-b-4 rounded-2xl font-black text-2xl active:scale-[0.98] transition-all shadow-lg focus:outline-none ${trackSwitch === 'blue' ? 'bg-blue-500 border-blue-700 hover:bg-blue-400 text-white' : 'bg-yellow-400 border-yellow-600 hover:bg-yellow-300 text-slate-900'}`;
                btn.innerText = trackSwitch === 'blue' ? "VÄXEL: BLÅ (UPP) ↗️" : "VÄXEL: GUL (NER) ↘️";
            }
        };

        function getBezier(p0, p1, p2, p3, t) {
            const u = 1 - t;
            const x = u*u*u*p0.x + 3*u*u*t*p1.x + 3*u*t*t*p2.x + t*t*t*p3.x;
            const y = u*u*u*p0.y + 3*u*u*t*p1.y + 3*u*t*t*p2.y + t*t*t*p3.y;
            return {x, y};
        }

        function getTrainPos(gT, pathColor) {
            const seg = Math.floor(gT);
            const t = gT - seg;
            if (pathColor === 'blue') {
                if(seg === 0) return {x: 300 + 200*t, y: 150}; 
                if(seg === 1) return getBezier({x:500,y:150}, {x:550,y:150}, {x:550,y:70}, {x:600,y:70}, t); 
                if(seg === 2) return {x: 600 + 80*Math.cos(-Math.PI/2 + Math.PI*t), y: 150 + 80*Math.sin(-Math.PI/2 + Math.PI*t)}; 
                if(seg === 3) return getBezier({x:600,y:230}, {x:550,y:230}, {x:550,y:150}, {x:500,y:150}, t); 
                if(seg === 4) return {x: 500 - 200*t, y: 150}; 
                if(seg === 5) return getBezier({x:300,y:150}, {x:250,y:150}, {x:250,y:70}, {x:200,y:70}, t); 
                if(seg === 6) return {x: 200 + 80*Math.cos(-Math.PI/2 - Math.PI*t), y: 150 + 80*Math.sin(-Math.PI/2 - Math.PI*t)}; 
                if(seg === 7) return getBezier({x:200,y:230}, {x:250,y:230}, {x:250,y:150}, {x:300,y:150}, t); 
            } else { 
                if(seg === 0) return {x: 300 + 200*t, y: 150}; 
                if(seg === 1) return getBezier({x:500,y:150}, {x:550,y:150}, {x:550,y:230}, {x:600,y:230}, t); 
                if(seg === 2) return {x: 600 + 80*Math.cos(Math.PI/2 - Math.PI*t), y: 150 + 80*Math.sin(Math.PI/2 - Math.PI*t)}; 
                if(seg === 3) return getBezier({x:600,y:70}, {x:550,y:70}, {x:550,y:150}, {x:500,y:150}, t); 
                if(seg === 4) return {x: 500 - 200*t, y: 150}; 
                if(seg === 5) return getBezier({x:300,y:150}, {x:250,y:150}, {x:250,y:230}, {x:200,y:230}, t); 
                if(seg === 6) return {x: 200 + 80*Math.cos(Math.PI/2 + Math.PI*t), y: 150 + 80*Math.sin(Math.PI/2 + Math.PI*t)}; 
                if(seg === 7) return getBezier({x:200,y:70}, {x:250,y:70}, {x:250,y:150}, {x:300,y:150}, t); 
            }
            return {x:300, y:150}; 
        }

        function spawnObstacle(side) {
            const isTop = Math.random() > 0.5;
            if (side === 'right') {
                obstacle = isTop ? { pos: 2.0, x: 600, y: 70 } : { pos: 2.0, x: 600, y: 230 }; 
            } else {
                obstacle = isTop ? { pos: 6.0, x: 200, y: 70 } : { pos: 6.0, x: 200, y: 230 }; 
            }
        }

        function runGame() {
            if(sessionData?.gameState !== 'lobby') return; 
            
            const canvas = document.getElementById('gameCanvas');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            
            let prevT = globalT;
            globalT += speed;
            
            if (globalT >= 8.0) { globalT -= 8.0; activePath = trackSwitch; }
            if (prevT < 4.0 && globalT >= 4.0) { activePath = trackSwitch; }
            
            if (prevT < 2.5 && globalT >= 2.5) {
                gameScore++; speed += 0.002;
                spawnObstacle('left'); 
                if(gameScore > highScore) { highScore = gameScore; localStorage.setItem('train_hs', highScore); }
            }
            if (prevT < 6.5 && globalT >= 6.5) {
                gameScore++; speed += 0.002;
                spawnObstacle('right'); 
                if(gameScore > highScore) { highScore = gameScore; localStorage.setItem('train_hs', highScore); }
            }

            let trainP = getTrainPos(globalT, activePath);

            if (Math.hypot(trainP.x - obstacle.x, trainP.y - obstacle.y) < 25) {
                gameScore = 0; speed = baseSpeed; globalT = 0; activePath = trackSwitch;
                spawnObstacle('right'); 
            }

            ctx.clearRect(0, 0, 800, 300);
            
            ctx.strokeStyle = "#475569"; ctx.lineWidth = 14; ctx.lineCap = "round";
            ctx.beginPath(); ctx.moveTo(300, 150); ctx.lineTo(500, 150); ctx.stroke();

            ctx.strokeStyle = "#3b82f6";
            ctx.beginPath(); ctx.moveTo(500, 150); ctx.bezierCurveTo(550, 150, 550, 70, 600, 70); ctx.arc(600, 150, 80, -Math.PI/2, 0); ctx.stroke();
            ctx.strokeStyle = "#eab308";
            ctx.beginPath(); ctx.arc(600, 150, 80, 0, Math.PI/2); ctx.bezierCurveTo(550, 230, 550, 150, 500, 150); ctx.stroke();

            ctx.strokeStyle = "#3b82f6";
            ctx.beginPath(); ctx.moveTo(300, 150); ctx.bezierCurveTo(250, 150, 250, 70, 200, 70); ctx.arc(200, 150, 80, -Math.PI/2, Math.PI, true); ctx.stroke();
            ctx.strokeStyle = "#eab308";
            ctx.beginPath(); ctx.arc(200, 150, 80, Math.PI, Math.PI/2, true); ctx.bezierCurveTo(250, 230, 250, 150, 300, 150); ctx.stroke();
            
            ctx.fillStyle = "#ef4444";
            ctx.beginPath(); ctx.arc(300, 150, 8, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(500, 150, 8, 0, Math.PI*2); ctx.fill();

            ctx.font = "30px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillText("📦", obstacle.x, obstacle.y);

            ctx.font = "40px Arial";
            ctx.fillText("🚂", trainP.x, trainP.y);
            
            const sDisplay = document.getElementById('scoreDisplay');
            if(sDisplay) sDisplay.innerText = gameScore;
            const hsDisplay = document.getElementById('hsDisplay');
            if(hsDisplay) hsDisplay.innerText = highScore;

            gameLoopId = requestAnimationFrame(runGame);
        }

        // --- FIREBASE SYNC ---
        // Wait for anonymous auth before starting Firebase operations
        signInAnonymously(auth);
        onAuthStateChanged(auth, (user) => {
            if (user && sessionPin) startListeners();
        });

        function startListeners() {
        setInterval(() => {
            if (playerId && sessionData && !finalResults) {
                updateDoc(doc(db, "sessions", sessionPin, "players", playerId), { lastActive: Date.now() }).catch(() => {});
            }
        }, 5000);

            onSnapshot(doc(db, "sessions", sessionPin), (docSnap) => {
                if (finalResults) return; 
                if (docSnap.exists()) {
                    sessionData = docSnap.data();
                    if(sessionData.gameState === 'finished') {
                        computeFinalResults();
                    } else {
                        render();
                    }
                } else {
                    if(!finalResults) {
                        document.getElementById('app').innerHTML = '<h1 class="text-center text-red-400 font-bold text-2xl mt-12">Spelet är stängt av din lärare.</h1>';
                        localStorage.removeItem(`pa_sparet_player_${sessionPin}`);
                    }
                }
            });

            onSnapshot(collection(db, "sessions", sessionPin, "players"), (snap) => {
                if(finalResults) return; 
                
                const newPlayers = [];
                snap.forEach(doc => newPlayers.push({id: doc.id, ...doc.data()}));
                
                // FIX: Om allPlayers har laddats tidigare, kontrollera om den ENDA ändringen 
                // var `lastActive`. I så fall slipper vi re-rendera hela skärmen!
                let shouldRender = true;
                if (allPlayers.length > 0 && allPlayers.length === newPlayers.length) {
                    const stripTime = p => { const { lastActive, ...rest } = p; return JSON.stringify(rest); };
                    const oldData = allPlayers.map(stripTime).sort();
                    const newData = newPlayers.map(stripTime).sort();
                    if (JSON.stringify(oldData) === JSON.stringify(newData)) {
                        shouldRender = false;
                    }
                }

                allPlayers = newPlayers;
                
                if(playerId) {
                    playerData = allPlayers.find(p => p.id === playerId);
                    // If stored player belongs to a different auth user, clear and re-join
                    if(playerData && playerData.uid && playerData.uid !== auth.currentUser.uid) {
                        localStorage.removeItem(`pa_sparet_player_${sessionPin}`);
                        playerId = null;
                        playerData = null;
                    }
                    if(playerData?.banned) {
                        localStorage.removeItem(`pa_sparet_player_${sessionPin}`);
                        document.getElementById('app').innerHTML = '<h1 class="text-center text-red-500 font-black text-3xl mt-20">Utkastad</h1><p class="text-center text-slate-400 mt-2">Din lärare har tagit bort dig från spelet.</p>';
                        return;
                    }
                }
                if (shouldRender) render();
            });
        } // end startListeners

        function computeFinalResults() {
            if(!playerData || !sessionData) return;
            const myTeam = sessionData.teams?.find(t => t.id === playerData.teamId);
            const teamMates = allPlayers.filter(p => p.teamId === myTeam?.id && !p.banned);
            
            const myTotalPoints = Object.values(playerData.answers || {}).reduce((sum, a) => sum + (a.points || 0), 0);
            let teamTotal = 0, teamAvg = 0;
            
            if (teamMates.length > 0) {
                teamTotal = teamMates.reduce((sum, p) => sum + Object.values(p.answers || {}).reduce((s, a) => s + (a.points || 0), 0), 0);
                teamAvg = Math.round((teamTotal / teamMates.length) * 10) / 10;
            }

            finalResults = { myTotalPoints, teamTotal, teamAvg, myTeam };
            render();
        }

        window.joinGame = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('joinBtn');
            const name = document.getElementById('playerName').value.trim();
            if(!name || btn.disabled) return;

            btn.disabled = true; btn.innerText = "Ansluter...";
            try {
                const docRef = await addDoc(collection(db, "sessions", sessionPin, "players"), {
                    name: name, teamId: null, banned: false, answers: {}, lastActive: Date.now(),
                    uid: auth.currentUser.uid
                });
                playerId = docRef.id;
                localStorage.setItem(`pa_sparet_player_${sessionPin}`, playerId);

                playerData = { id: playerId, name: name, teamId: null, banned: false, answers: {}, lastActive: Date.now(), uid: auth.currentUser.uid };
                allPlayers.push(playerData);
                render();
            } catch (err) {
                console.error("Fel vid anslutning:", err);
                showToast("Kunde inte ansluta till spelet.", "❌");
                btn.disabled = false; btn.innerText = "Gå med i spelet";
            }
        };

        window.lockAnswer = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('lockBtn');
            const answerText = document.getElementById('answerInput').value.trim();
            if(!answerText || btn.disabled) return;
            
            btn.disabled = true; btn.innerText = "Låser...";
            try {
                await updateDoc(doc(db, "sessions", sessionPin, "players", playerId), {
                    [`answers.${sessionData.currentBoardIndex}`]: { text: answerText, clueIndex: sessionData.currentClueIndex, locked: true, correct: null, points: 0, status: null }
                });
            } catch (err) { 
                console.error("Fel vid låsning:", err);
                showToast("Kunde inte låsa ditt svar.", "❌"); 
                btn.disabled = false; btn.innerText = "Lås in mitt svar!"; 
            }
        };

        function render() {
            const appEl = document.getElementById('app');

            // FIX: Spara nuvarande fokus och input innan skärmen ritas om 
            // så att man inte tappar bort det man skriver när läraren t.ex. låser upp ny ledtråd!
            const activeId = document.activeElement ? document.activeElement.id : null;
            const answerInputEl = document.getElementById('answerInput');
            const savedAnswer = answerInputEl ? answerInputEl.value : '';
            const nameInputEl = document.getElementById('playerName');
            const savedName = nameInputEl ? nameInputEl.value : '';

            if (finalResults) {
                const { myTotalPoints, teamTotal, teamAvg, myTeam } = finalResults;
                const teamBadge = myTeam ? `<div class="px-4 py-2 rounded-full text-sm font-bold mb-8 mx-auto w-max" style="background-color: ${myTeam.color}20; color: ${myTeam.color}; border: 1px solid ${myTeam.color}40">${myTeam.name}</div>` : '';
                
                appEl.innerHTML = `
                    <div class="text-center flex-1 flex flex-col justify-center max-w-2xl mx-auto w-full">
                        ${teamBadge}
                        <h2 class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-500 mb-8">Bra kämpat!</h2>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                            <div class="bg-slate-800 p-8 rounded-3xl border border-slate-700 shadow-xl">
                                <p class="text-slate-400 font-bold uppercase tracking-widest text-xs mb-2">Du bidrog med</p>
                                <p class="text-6xl font-black text-white">${myTotalPoints} <span class="text-2xl text-slate-500">p</span></p>
                            </div>
                            <div class="bg-slate-800 p-8 rounded-3xl border border-slate-700 shadow-xl flex flex-col justify-center">
                                <p class="text-slate-400 font-bold uppercase tracking-widest text-xs mb-1">Lagsnitt</p>
                                <p class="text-4xl font-black text-amber-400 mb-4">${teamAvg} p</p>
                                <p class="text-slate-500 text-sm">Lagets totala poäng: ${teamTotal}</p>
                            </div>
                        </div>
                        
                        <p class="text-slate-500 mt-4 font-bold text-sm uppercase tracking-widest animate-pulse">Kolla in prispallen på storskärmen!</p>
                    </div>
                `;
                return;
            }

            if (!sessionData) return;

            if (!playerId || !playerData) {
                appEl.innerHTML = `
                    <div class="text-center mb-8">
                        <h1 class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-500 mb-2 font-serif">På Rätt Spår</h1>
                        <p class="text-slate-400 font-medium">Skriv in ditt namn för att vara med</p>
                    </div>
                    <form onsubmit="joinGame(event)" class="max-w-md mx-auto w-full space-y-4">
                        <input type="text" id="playerName" class="w-full bg-slate-800 border-2 border-slate-700 rounded-xl p-4 text-xl text-center text-white focus:border-amber-500 focus:outline-none transition-colors" placeholder="Ditt namn..." required maxlength="20" autocomplete="off">
                        <button type="submit" id="joinBtn" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-900 font-black text-lg py-4 rounded-xl shadow-lg transition-transform active:scale-95 disabled:opacity-50">Gå med i spelet</button>
                    </form>
                `;
            } else {
                const myTeam = sessionData.teams?.find(t => t.id === playerData.teamId);
                let smallTeamHtml = '';
                let lobbyTeamHtml = '';

                if (myTeam) {
                    const teamMates = allPlayers.filter(p => p.teamId === myTeam.id && p.id !== playerId && !p.banned);
                    
                    let playerListHtml = teamMates.map(m => `<p class="font-bold text-2xl text-white mb-3">${m.name}</p>`).join('');
                    playerListHtml += `<p class="font-black text-2xl text-amber-400 border-t border-slate-700/50 pt-3 mt-3">${playerData.name} (Du)</p>`;

                    smallTeamHtml = `
                        <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700 mb-6 flex flex-col md:flex-row items-center justify-between shadow-sm gap-2">
                            <div class="text-center md:text-left">
                                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Ditt Lag</p>
                                <p class="font-black text-xl mb-1" style="color: ${myTeam.color}">${myTeam.name}</p>
                            </div>
                            <div class="text-center md:text-right text-xs text-slate-400 font-medium">
                                ${teamMates.length > 0 ? `Lagkamrater:<br><span class="text-white">${teamMates.map(m => m.name).join(', ')}</span>` : 'Du är ensam i laget.'}
                            </div>
                        </div>
                    `;

                    lobbyTeamHtml = `
                        <div class="bg-slate-800 p-8 rounded-3xl border-2 border-slate-700 shadow-xl w-full max-w-sm mb-6 mx-auto">
                            <p class="text-sm text-slate-400 font-bold uppercase tracking-widest mb-2 text-center">Ditt lag</p>
                            <p class="font-black text-4xl md:text-5xl mb-6 drop-shadow-md text-center" style="color: ${myTeam.color}">${myTeam.name}</p>
                            <div class="bg-slate-900/80 rounded-2xl p-6 w-full border border-slate-700/50 text-center">
                                ${playerListHtml}
                            </div>
                        </div>
                    `;
                }

                if (sessionData.gameState === 'lobby') {
                    appEl.innerHTML = `
                        <div class="flex-1 flex flex-col lg:flex-row items-center justify-center gap-8 w-full max-w-6xl mx-auto">
                            
                            <div class="w-full lg:w-1/3 flex justify-center">
                                ${myTeam ? lobbyTeamHtml : `
                                    <div class="text-center">
                                        <h2 class="text-5xl font-black text-white mb-4">Hej ${playerData.name}!</h2>
                                        <p class="text-xl text-slate-400 font-medium">Väntar på att läraren ska dela in lag...</p>
                                    </div>
                                `}
                            </div>
                            
                            <div class="w-full lg:w-2/3 flex flex-col items-center">
                                <p class="text-xl text-amber-400 font-bold animate-pulse uppercase tracking-widest mb-8">Invänta Spelledaren...</p>
                                
                                <div class="bg-slate-800 p-6 md:p-8 rounded-3xl border-2 border-slate-700 shadow-2xl select-none w-full max-w-3xl">
                                    <div class="flex justify-between items-center mb-6">
                                        <div>
                                            <p class="text-amber-400 font-bold uppercase tracking-widest text-xs mb-1">Minispel</p>
                                            <h3 class="text-xl font-bold text-white">Akta dig för lådorna!</h3>
                                        </div>
                                        <p class="text-6xl font-black text-emerald-400" id="scoreDisplay">${gameScore}</p>
                                    </div>
                                    
                                    <canvas id="gameCanvas" width="800" height="300" class="w-full bg-[#0f172a] rounded-2xl mb-6 border-4 border-slate-950" style="touch-action: none;"></canvas>
                                    
                                    <button id="switchBtn" onclick="toggleSwitch()" class="w-full py-4 border-b-4 border-blue-700 bg-blue-500 hover:bg-blue-400 text-white rounded-2xl font-black text-2xl active:scale-[0.98] transition-all shadow-lg focus:outline-none">
                                        VÄXEL: BLÅ (UPP) ↗️
                                    </button>
                                    
                                    <p class="text-slate-500 text-sm font-bold text-center mt-6">Ditt highscore: <span id="hsDisplay" class="text-white">${highScore}</span></p>
                                </div>
                            </div>
                        </div>
                    `;
                    
                    cancelAnimationFrame(gameLoopId);
                    gameLoopId = requestAnimationFrame(runGame);
                } 
                else if (sessionData.gameState === 'playing') {
                    const currentBoard = sessionData.boards[sessionData.currentBoardIndex];
                    const activeClueIndex = sessionData.currentClueIndex;
                    const myAnswer = playerData.answers?.[sessionData.currentBoardIndex];

                    let cluesHtml = currentBoard.clues.slice(0, activeClueIndex + 1).map((clue, i) => `
                        <div class="bg-slate-800 p-4 md:p-6 rounded-xl border border-slate-700 mb-3 shadow-md flex flex-col md:flex-row md:items-center gap-2 md:gap-6">
                            <span class="bg-slate-900 text-amber-500 text-sm font-black px-4 py-2 rounded-lg shrink-0 uppercase tracking-wider w-max">${POINTS[i]} poäng</span>
                            <p class="text-lg md:text-xl font-medium text-slate-100 leading-relaxed">${clue}</p>
                        </div>
                    `).join('');

                    if (myAnswer?.locked) {
                        appEl.innerHTML = `${smallTeamHtml}
                            <div class="text-center flex-1 flex flex-col justify-center max-w-2xl mx-auto w-full">
                                <p class="text-emerald-400 font-bold mb-2 uppercase tracking-widest text-sm">Svar låst!</p>
                                <h2 class="text-4xl md:text-5xl font-black text-white mb-6">"${myAnswer.text}"</h2>
                                <p class="text-slate-400 text-base">Låst på <span class="text-amber-400 font-bold">${POINTS[myAnswer.clueIndex]}p</span>-nivån.</p>
                                <div class="mt-12 w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
                            </div>
                        `;
                    } else {
                        appEl.innerHTML = `${smallTeamHtml}
                            <div class="flex-1 overflow-y-auto mb-6 pb-4 pr-2">
                                ${cluesHtml}
                            </div>
                            <form onsubmit="lockAnswer(event)" class="bg-slate-800 p-4 md:p-6 rounded-2xl border border-slate-700 sticky bottom-4 shadow-[0_-10px_30px_rgba(0,0,0,0.3)] flex flex-col md:flex-row gap-3">
                                <input type="text" id="answerInput" class="flex-1 bg-slate-900 border-2 border-slate-600 rounded-xl px-6 py-4 text-white font-bold text-xl md:text-2xl focus:border-amber-500 focus:outline-none transition-colors placeholder:text-slate-600" placeholder="Skriv ditt svar..." required autocomplete="off">
                                <button type="submit" id="lockBtn" class="bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-black px-10 py-4 rounded-xl shadow-lg transition-transform active:scale-95 disabled:opacity-50 text-xl md:text-2xl whitespace-nowrap">Lås in mitt svar!</button>
                            </form>
                        `;
                    }
                }
                else if (sessionData.gameState === 'revealing') {
                    const myAnswer = playerData.answers?.[sessionData.currentBoardIndex];
                    
                    let resultHtml = !myAnswer ? `<p class="text-slate-400 font-black text-xl">Du svarade tyvärr inte.</p>`
                        : myAnswer.correct === null ? `<p class="text-amber-400 font-black text-2xl animate-pulse">Läraren rättar ditt svar...</p>`
                        : myAnswer.status === 'minus' ? `<p class="text-red-400 font-black text-4xl mb-1">STRAFF!</p><p class="text-red-500 font-bold text-lg">-5 poäng till laget</p>`
                        : myAnswer.correct === true ? `<p class="text-emerald-400 font-black text-5xl mb-1">RÄTT!</p><p class="text-emerald-500 font-bold text-xl">+${myAnswer.points} poäng till laget</p>`
                        : `<p class="text-red-400 font-black text-5xl mb-1">FEL!</p><p class="text-red-500 font-bold text-xl">0 poäng</p>`;

                    appEl.innerHTML = `${smallTeamHtml}
                        <div class="text-center flex-1 flex flex-col justify-center max-w-2xl mx-auto w-full">
                            <p class="text-slate-400 font-bold uppercase tracking-widest text-sm mb-2">Rätt svar var</p>
                            <h2 class="text-5xl md:text-6xl font-black text-white mb-10 drop-shadow-md break-words">${sessionData.revealedAnswer}</h2>
                            
                            <div class="bg-slate-800 p-10 rounded-3xl border-2 border-slate-700 shadow-xl relative overflow-hidden w-full">
                                ${myAnswer ? `<p class="text-slate-400 font-bold text-base mb-6">Du skrev: <span class="text-white">"${myAnswer.text}"</span></p>` : ''}
                                ${resultHtml}
                            </div>
                        </div>
                    `;
                }
            }

            // FIX: Återställ det man höll på att skriva och sätt fokus tillbaka där markören var
            if (activeId === 'answerInput') {
                const newAnswerInput = document.getElementById('answerInput');
                if (newAnswerInput) {
                    newAnswerInput.value = savedAnswer;
                    newAnswerInput.focus();
                    newAnswerInput.setSelectionRange(newAnswerInput.value.length, newAnswerInput.value.length);
                }
            } else if (activeId === 'playerName') {
                const newNameInput = document.getElementById('playerName');
                if (newNameInput) {
                    newNameInput.value = savedName;
                    newNameInput.focus();
                    newNameInput.setSelectionRange(newNameInput.value.length, newNameInput.value.length);
                }
            }
        }
    </script>
</body>
</html>

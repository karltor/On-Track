<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>På Rätt Spår</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans flex flex-col selection:bg-amber-500 selection:text-slate-900">

    <div id="app" class="flex-1 flex flex-col p-4 md:p-8 max-w-4xl w-full mx-auto justify-center">
        <div class="flex justify-center"><div class="w-10 h-10 border-4 border-amber-500 border-t-transparent rounded-full animate-spin"></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, doc, collection, onSnapshot, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const app = initializeApp({
            apiKey: "AIzaSyCZGQi85oGYum0mnUowUcw4QMt3tyoHK1U",
            authDomain: "on-track-d77d0.firebaseapp.com",
            projectId: "on-track-d77d0"
        });
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const sessionPin = urlParams.get('session');
        let playerId = localStorage.getItem(`pa_sparet_player_${sessionPin}`);

        if (!sessionPin) {
            document.getElementById('app').innerHTML = '<h1 class="text-center text-red-400 font-bold text-xl">Ingen PIN-kod angiven i länk.</h1>';
        }

        let sessionData = null;
        let allPlayers = [];
        let playerData = null;
        let finalResults = null; 
        const POINTS = [10, 8, 6, 4, 2];

        let coalCount = 0;
        let highScore = parseInt(localStorage.getItem('pa_sparet_hs')) || 0;

        // HEARTBEAT (var 5e sekund för att visa att vi lever)
        setInterval(() => {
            if (playerId && sessionData && !finalResults) {
                updateDoc(doc(db, "sessions", sessionPin, "players", playerId), {
                    lastActive: Date.now()
                }).catch(() => {});
            }
        }, 5000);

        if(sessionPin) {
            onSnapshot(doc(db, "sessions", sessionPin), (docSnap) => {
                if (finalResults) return; 

                if (docSnap.exists()) {
                    sessionData = docSnap.data();
                    if(sessionData.gameState === 'finished') {
                        computeFinalResults();
                    } else {
                        render();
                    }
                } else {
                    if(!finalResults) {
                        document.getElementById('app').innerHTML = '<h1 class="text-center text-red-400 font-bold text-2xl mt-12">Spelet är stängt av din lärare.</h1>';
                        localStorage.removeItem(`pa_sparet_player_${sessionPin}`);
                    }
                }
            });

            onSnapshot(collection(db, "sessions", sessionPin, "players"), (snap) => {
                if(finalResults) return; 
                allPlayers = [];
                snap.forEach(doc => allPlayers.push({id: doc.id, ...doc.data()}));
                
                if(playerId) {
                    playerData = allPlayers.find(p => p.id === playerId);
                    if(playerData?.banned) {
                        localStorage.removeItem(`pa_sparet_player_${sessionPin}`);
                        document.getElementById('app').innerHTML = '<h1 class="text-center text-red-500 font-black text-3xl mt-20">Utkastad</h1><p class="text-center text-slate-400 mt-2">Din lärare har tagit bort dig från spelet.</p>';
                        return;
                    }
                }
                render();
            });
        }

        function computeFinalResults() {
            if(!playerData || !sessionData) return;
            const myTeam = sessionData.teams?.find(t => t.id === playerData.teamId);
            const teamMates = allPlayers.filter(p => p.teamId === myTeam?.id && !p.banned);
            
            const myTotalPoints = Object.values(playerData.answers || {}).reduce((sum, a) => sum + (a.points || 0), 0);
            let teamTotal = 0;
            let teamAvg = 0;
            
            if (teamMates.length > 0) {
                teamTotal = teamMates.reduce((sum, p) => sum + Object.values(p.answers || {}).reduce((s, a) => s + (a.points || 0), 0), 0);
                teamAvg = Math.round((teamTotal / teamMates.length) * 10) / 10;
            }

            finalResults = { myTotalPoints, teamTotal, teamAvg, myTeam };
            render();
        }

        window.joinGame = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('joinBtn');
            const name = document.getElementById('playerName').value.trim();
            if(!name || btn.disabled) return;

            btn.disabled = true;
            btn.innerText = "Ansluter...";
            try {
                const docRef = await addDoc(collection(db, "sessions", sessionPin, "players"), {
                    name: name, teamId: null, banned: false, answers: {}, lastActive: Date.now()
                });
                playerId = docRef.id;
                localStorage.setItem(`pa_sparet_player_${sessionPin}`, playerId);
                
                playerData = { id: playerId, name: name, teamId: null, banned: false, answers: {}, lastActive: Date.now() };
                allPlayers.push(playerData);
                render();
                
            } catch { 
                alert("Kunde inte ansluta."); 
                btn.disabled = false;
                btn.innerText = "Gå med"; 
            }
        };

        window.lockAnswer = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('lockBtn');
            const answerText = document.getElementById('answerInput').value.trim();
            if(!answerText || btn.disabled) return;
            
            btn.disabled = true;
            btn.innerText = "Låser...";
            try {
                await updateDoc(doc(db, "sessions", sessionPin, "players", playerId), {
                    [`answers.${sessionData.currentBoardIndex}`]: { text: answerText, clueIndex: sessionData.currentClueIndex, locked: true, correct: null, points: 0, status: null }
                });
            } catch { 
                alert("Fel vid låsning!"); 
                btn.disabled = false;
                btn.innerText = "Lås in mitt svar!"; 
            }
        };

        window.shovelCoal = () => {
            coalCount++;
            document.getElementById('coalDisplay').innerText = coalCount + " 🪨";
            if(coalCount > highScore) {
                highScore = coalCount;
                localStorage.setItem('pa_sparet_hs', highScore);
                document.getElementById('hsDisplay').innerText = highScore;
            }
        };

        function render() {
            const appEl = document.getElementById('app');

            if (finalResults) {
                const { myTotalPoints, teamTotal, teamAvg, myTeam } = finalResults;
                const teamBadge = myTeam ? `<div class="px-4 py-2 rounded-full text-sm font-bold mb-8 mx-auto w-max" style="background-color: ${myTeam.color}20; color: ${myTeam.color}; border: 1px solid ${myTeam.color}40">${myTeam.name}</div>` : '';
                
                appEl.innerHTML = `
                    <div class="text-center flex-1 flex flex-col justify-center max-w-2xl mx-auto w-full">
                        ${teamBadge}
                        <h2 class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-500 mb-8">Bra kämpat!</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                            <div class="bg-slate-800 p-8 rounded-3xl border border-slate-700 shadow-xl">
                                <p class="text-slate-400 font-bold uppercase tracking-widest text-xs mb-2">Du bidrog med</p>
                                <p class="text-6xl font-black text-white">${myTotalPoints} <span class="text-2xl text-slate-500">p</span></p>
                            </div>
                            <div class="bg-slate-800 p-8 rounded-3xl border border-slate-700 shadow-xl flex flex-col justify-center">
                                <p class="text-slate-400 font-bold uppercase tracking-widest text-xs mb-1">Lagsnitt</p>
                                <p class="text-4xl font-black text-amber-400 mb-4">${teamAvg} p</p>
                                <p class="text-slate-500 text-sm">Lagets totala poäng: ${teamTotal}</p>
                            </div>
                        </div>
                        <p class="text-slate-500 mt-4 font-bold text-sm uppercase tracking-widest animate-pulse">Kolla in prispallen på storskärmen!</p>
                    </div>
                `;
                return;
            }

            if (!sessionData) return;

            if (!playerId || !playerData) {
                appEl.innerHTML = `
                    <div class="text-center mb-8">
                        <h1 class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-500 mb-2">På Rätt Spår</h1>
                        <p class="text-slate-400 font-medium">Skriv in ditt namn för att vara med</p>
                    </div>
                    <form onsubmit="joinGame(event)" class="max-w-md mx-auto w-full space-y-4">
                        <input type="text" id="playerName" class="w-full bg-slate-800 border-2 border-slate-700 rounded-xl p-4 text-xl text-center text-white focus:border-amber-500 focus:outline-none transition-colors" placeholder="Ditt namn..." required maxlength="20">
                        <button type="submit" id="joinBtn" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-900 font-black text-lg py-4 rounded-xl shadow-lg transition-transform active:scale-95 disabled:opacity-50">Gå med i spelet</button>
                    </form>
                `;
                return;
            }

            const myTeam = sessionData.teams?.find(t => t.id === playerData.teamId);
            const teamMates = myTeam ? allPlayers.filter(p => p.teamId === myTeam.id && p.id !== playerId && !p.banned) : [];
            
            const smallTeamHtml = myTeam ? `
                <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700 mb-6 flex flex-col md:flex-row items-center justify-between shadow-sm gap-2">
                    <div class="text-center md:text-left">
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Ditt Lag</p>
                        <p class="font-black text-xl mb-1" style="color: ${myTeam.color}">${myTeam.name}</p>
                    </div>
                    <div class="text-center md:text-right text-xs text-slate-400 font-medium">
                        ${teamMates.length > 0 ? `Lagkamrater:<br><span class="text-white">${teamMates.map(m => m.name).join(', ')}</span>` : 'Du är ensam i laget än så länge.'}
                    </div>
                </div>
            ` : '';

            const lobbyTeamHtml = myTeam ? `
                <div class="bg-slate-800 p-8 rounded-3xl border-2 border-slate-700 mb-8 text-center shadow-xl">
                    <p class="text-sm text-slate-400 font-bold uppercase tracking-widest mb-2">Du spelar i</p>
                    <p class="font-black text-5xl md:text-6xl mb-8 drop-shadow-md" style="color: ${myTeam.color}">${myTeam.name}</p>
                    <div class="bg-slate-900/80 rounded-2xl p-6 w-full border border-slate-700/50">
                        <p class="text-xs text-slate-500 font-bold uppercase tracking-widest mb-4">Dina Lagkamrater</p>
                        <p class="text-2xl text-white font-medium leading-relaxed">
                            ${teamMates.length > 0 ? teamMates.map(m => m.name).join('<br>') : '<span class="text-slate-500 italic">Du är ensam än så länge...</span>'}
                        </p>
                    </div>
                </div>
            ` : '';

            if (sessionData.gameState === 'lobby') {
                appEl.innerHTML = `
                    <div class="text-center flex-1 flex flex-col justify-center max-w-2xl mx-auto w-full">
                        ${lobbyTeamHtml}
                        <h2 class="text-4xl font-black text-white mb-2">Hej ${playerData.name}!</h2>
                        <p class="text-xl text-slate-400 font-medium mb-12">Invänta Spelledaren...</p>
                        
                        <div class="bg-slate-800 p-6 rounded-3xl border-2 border-slate-700 shadow-xl select-none">
                            <p class="text-amber-400 font-bold uppercase tracking-widest text-xs mb-4">Minispel</p>
                            <h3 class="text-xl font-bold text-white mb-2">Håll trycket uppe i loket!</h3>
                            <p class="text-4xl font-black mb-6" id="coalDisplay">${coalCount} 🪨</p>
                            <button onclick="shovelCoal()" class="text-7xl active:scale-75 transition-transform hover:scale-110 mb-4 focus:outline-none" style="WebkitTapHighlightColor: transparent;">🚂</button>
                            <p class="text-slate-500 text-sm font-bold">Ditt rekord: <span id="hsDisplay" class="text-white">${highScore}</span></p>
                        </div>
                    </div>
                `;
            }
            else if (sessionData.gameState === 'playing') {
                const currentBoard = sessionData.boards[sessionData.currentBoardIndex];
                const activeClueIndex = sessionData.currentClueIndex;
                const myAnswer = playerData.answers?.[sessionData.currentBoardIndex];

                let cluesHtml = currentBoard.clues.slice(0, activeClueIndex + 1).map((clue, i) => `
                    <div class="bg-slate-800 p-4 md:p-6 rounded-xl border border-slate-700 mb-3 shadow-md flex flex-col md:flex-row md:items-center gap-2 md:gap-6">
                        <span class="bg-slate-900 text-amber-500 text-sm font-black px-4 py-2 rounded-lg shrink-0 uppercase tracking-wider w-max">${POINTS[i]} poäng</span>
                        <p class="text-lg md:text-xl font-medium text-slate-100 leading-relaxed">${clue}</p>
                    </div>
                `).join('');

                if (myAnswer?.locked) {
                    appEl.innerHTML = `${smallTeamHtml}
                        <div class="text-center flex-1 flex flex-col justify-center max-w-2xl mx-auto w-full">
                            <p class="text-emerald-400 font-bold mb-2 uppercase tracking-widest text-sm">Svar låst!</p>
                            <h2 class="text-4xl font-black text-white mb-6">"${myAnswer.text}"</h2>
                            <p class="text-slate-400 text-sm">Låst på <span class="text-amber-400 font-bold">${POINTS[myAnswer.clueIndex]}p</span>-nivån.</p>
                            <div class="mt-12 w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
                        </div>
                    `;
                } else {
                    appEl.innerHTML = `${smallTeamHtml}
                        <div class="flex-1 overflow-y-auto mb-6 pb-4 pr-2">
                            ${cluesHtml}
                        </div>
                        <form onsubmit="lockAnswer(event)" class="bg-slate-800 p-4 md:p-6 rounded-2xl border border-slate-700 sticky bottom-4 shadow-[0_-10px_30px_rgba(0,0,0,0.3)] flex flex-col md:flex-row gap-3">
                            <input type="text" id="answerInput" class="flex-1 bg-slate-900 border-2 border-slate-600 rounded-xl px-6 py-4 text-white font-bold text-xl md:text-2xl focus:border-amber-500 focus:outline-none transition-colors placeholder:text-slate-600" placeholder="Skriv ditt svar..." required autocomplete="off">
                            <button type="submit" id="lockBtn" class="bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-black px-10 py-4 rounded-xl shadow-lg transition-transform active:scale-95 disabled:opacity-50 text-xl md:text-2xl whitespace-nowrap">Lås in mitt svar!</button>
                        </form>
                    `;
                }
            }
            else if (sessionData.gameState === 'revealing') {
                const myAnswer = playerData.answers?.[sessionData.currentBoardIndex];
                
                let resultHtml = !myAnswer ? `<p class="text-slate-400 font-black text-xl">Du svarade tyvärr inte.</p>`
                    : myAnswer.correct === null ? `<p class="text-amber-400 font-black text-2xl animate-pulse">Läraren rättar ditt svar...</p>`
                    : myAnswer.status === 'minus' ? `<p class="text-red-400 font-black text-4xl mb-1">STRAFF!</p><p class="text-red-500 font-bold text-lg">-5 poäng till laget</p>`
                    : myAnswer.correct === true ? `<p class="text-emerald-400 font-black text-5xl mb-1">RÄTT!</p><p class="text-emerald-500 font-bold text-xl">+${myAnswer.points} poäng till laget</p>`
                    : `<p class="text-red-400 font-black text-5xl mb-1">FEL!</p><p class="text-red-500 font-bold text-xl">0 poäng</p>`;

                appEl.innerHTML = `${smallTeamHtml}
                    <div class="text-center flex-1 flex flex-col justify-center max-w-2xl mx-auto w-full">
                        <p class="text-slate-400 font-bold uppercase tracking-widest text-sm mb-2">Rätt svar var</p>
                        <h2 class="text-5xl md:text-6xl font-black text-white mb-10 drop-shadow-md break-words">${sessionData.revealedAnswer}</h2>
                        
                        <div class="bg-slate-800 p-10 rounded-3xl border-2 border-slate-700 shadow-xl relative overflow-hidden w-full">
                            ${myAnswer ? `<p class="text-slate-400 font-bold text-base mb-6">Du skrev: <span class="text-white">"${myAnswer.text}"</span></p>` : ''}
                            ${resultHtml}
                        </div>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>

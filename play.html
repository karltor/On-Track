<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>På Rätt Spår</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans flex flex-col">

    <div id="app" class="flex-1 flex flex-col p-4 md:p-8 max-w-4xl w-full mx-auto justify-center">
        <div class="flex justify-center"><div class="w-10 h-10 border-4 border-amber-500 border-t-transparent rounded-full animate-spin"></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, doc, collection, onSnapshot, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const app = initializeApp({
            apiKey: "AIzaSyCZGQi85oGYum0mnUowUcw4QMt3tyoHK1U",
            authDomain: "on-track-d77d0.firebaseapp.com",
            projectId: "on-track-d77d0"
        });
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const sessionPin = urlParams.get('session');
        let playerId = localStorage.getItem(`pa_sparet_player_${sessionPin}`);

        if (!sessionPin) {
            document.getElementById('app').innerHTML = '<h1 class="text-center text-red-400 font-bold text-xl">Ingen PIN-kod angiven i länk.</h1>';
        }

        let sessionData = null;
        let allPlayers = [];
        let playerData = null;
        const POINTS = [10, 8, 6, 4, 2];

        if(sessionPin) {
            onSnapshot(doc(db, "sessions", sessionPin), (docSnap) => {
                if (docSnap.exists()) {
                    sessionData = docSnap.data();
                    render();
                } else {
                    document.getElementById('app').innerHTML = '<h1 class="text-center text-red-400 font-bold text-2xl">Spelet är avslutat.</h1>';
                    localStorage.removeItem(`pa_sparet_player_${sessionPin}`);
                }
            });

            onSnapshot(collection(db, "sessions", sessionPin, "players"), (snap) => {
                allPlayers = [];
                snap.forEach(doc => allPlayers.push({id: doc.id, ...doc.data()}));
                
                if(playerId) {
                    playerData = allPlayers.find(p => p.id === playerId);
                    if(playerData?.banned) {
                        localStorage.removeItem(`pa_sparet_player_${sessionPin}`);
                        document.getElementById('app').innerHTML = '<h1 class="text-center text-red-500 font-black text-3xl mt-20">Utkastad</h1>';
                        return;
                    }
                }
                render();
            });
        }

        window.joinGame = async (e) => {
            e.preventDefault();
            const name = document.getElementById('playerName').value.trim();
            if(!name) return;
            document.getElementById('joinBtn').innerText = "Ansluter...";
            try {
                const docRef = await addDoc(collection(db, "sessions", sessionPin, "players"), {
                    name: name, teamId: null, banned: false, answers: {}
                });
                playerId = docRef.id;
                localStorage.setItem(`pa_sparet_player_${sessionPin}`, playerId);
            } catch { alert("Kunde inte ansluta."); document.getElementById('joinBtn').innerText = "Gå med"; }
        };

        window.lockAnswer = async (e) => {
            e.preventDefault();
            const answerText = document.getElementById('answerInput').value.trim();
            if(!answerText) return;
            document.getElementById('lockBtn').innerText = "Låser...";
            try {
                await updateDoc(doc(db, "sessions", sessionPin, "players", playerId), {
                    [`answers.${sessionData.currentBoardIndex}`]: { text: answerText, clueIndex: sessionData.currentClueIndex, locked: true, correct: null, points: 0 }
                });
            } catch { alert("Fel vid låsning!"); document.getElementById('lockBtn').innerText = "Lås Svar"; }
        };

        function render() {
            if (!sessionData) return;
            const appEl = document.getElementById('app');

            if (!playerId || !playerData) {
                appEl.innerHTML = `
                    <div class="text-center mb-8">
                        <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-500 mb-2">På Rätt Spår</h1>
                        <p class="text-slate-400">Vem är du?</p>
                    </div>
                    <form onsubmit="joinGame(event)" class="max-w-sm mx-auto w-full space-y-4">
                        <input type="text" id="playerName" class="w-full bg-slate-800 border-2 border-slate-700 rounded-xl p-4 text-xl text-center focus:border-amber-500 focus:outline-none" placeholder="Ditt namn..." required>
                        <button type="submit" id="joinBtn" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-900 font-black text-lg py-4 rounded-xl transition">Gå med</button>
                    </form>
                `;
                return;
            }

            const myTeam = sessionData.teams?.find(t => t.id === playerData.teamId);
            const teamMates = myTeam ? allPlayers.filter(p => p.teamId === myTeam.id && p.id !== playerId) : [];
            const teamHtml = myTeam ? `
                <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700 mb-6 flex items-center justify-between shadow-sm">
                    <div>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Ditt Lag</p>
                        <p class="font-black text-lg" style="color: ${myTeam.color}">${myTeam.name}</p>
                    </div>
                    <div class="text-right text-xs text-slate-400 font-medium">
                        ${teamMates.length > 0 ? `Tillsammans med:<br><span class="text-white">${teamMates.map(m => m.name).join(', ')}</span>` : 'Du är ensam i laget.'}
                    </div>
                </div>
            ` : '';

            if (sessionData.gameState === 'lobby') {
                appEl.innerHTML = `${teamHtml}
                    <div class="text-center flex-1 flex flex-col justify-center">
                        <h2 class="text-3xl font-black text-white mb-2">Tjena ${playerData.name}!</h2>
                        <p class="text-slate-400">Invänta spelledaren...</p>
                    </div>
                `;
            }
            else if (sessionData.gameState === 'playing') {
                const currentBoard = sessionData.boards[sessionData.currentBoardIndex];
                const activeClueIndex = sessionData.currentClueIndex;
                const myAnswer = playerData.answers?.[sessionData.currentBoardIndex];

                let cluesHtml = currentBoard.clues.slice(0, activeClueIndex + 1).map((clue, i) => `
                    <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 mb-3 shadow-md flex items-start gap-4">
                        <span class="bg-slate-900 text-amber-500 text-xs font-black px-3 py-1.5 rounded-lg shrink-0 mt-0.5">${POINTS[i]} p</span>
                        <p class="text-lg font-medium text-slate-200">${clue}</p>
                    </div>
                `).join('');

                if (myAnswer?.locked) {
                    appEl.innerHTML = `${teamHtml}
                        <div class="text-center flex-1 flex flex-col justify-center">
                            <p class="text-emerald-400 font-bold mb-2 uppercase tracking-widest text-sm">Svar låst!</p>
                            <h2 class="text-3xl font-black text-white mb-4">"${myAnswer.text}"</h2>
                            <p class="text-slate-400 text-sm">Låst på ${POINTS[myAnswer.clueIndex]} poäng. Invätar facit...</p>
                        </div>
                    `;
                } else {
                    appEl.innerHTML = `${teamHtml}
                        <div class="flex-1 overflow-y-auto mb-6 pb-4">${cluesHtml}</div>
                        <form onsubmit="lockAnswer(event)" class="bg-slate-800 p-4 rounded-2xl border border-slate-700 sticky bottom-4 shadow-xl flex gap-3">
                            <input type="text" id="answerInput" class="flex-1 bg-slate-900 border-2 border-slate-600 rounded-xl px-4 text-white font-bold text-lg focus:border-amber-500 focus:outline-none" placeholder="Skriv ditt svar..." required>
                            <button type="submit" id="lockBtn" class="bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-black px-8 py-4 rounded-xl shadow-lg transition whitespace-nowrap">Lås in</button>
                        </form>
                    `;
                }
            }
            else if (sessionData.gameState === 'revealing') {
                const myAnswer = playerData.answers?.[sessionData.currentBoardIndex];
                
                let resultHtml = !myAnswer ? `<p class="text-slate-400 font-black text-xl">Inget svar inskickat.</p>`
                    : myAnswer.correct === null ? `<p class="text-amber-400 font-black text-xl animate-pulse">Läraren rättar...</p>`
                    : myAnswer.correct === true ? `<p class="text-emerald-400 font-black text-4xl">+${myAnswer.points}p</p>`
                    : `<p class="text-red-400 font-black text-4xl">FEL</p>`;

                appEl.innerHTML = `${teamHtml}
                    <div class="text-center flex-1 flex flex-col justify-center">
                        <p class="text-slate-400 font-bold uppercase tracking-widest text-sm mb-2">Rätt svar var</p>
                        <h2 class="text-5xl md:text-6xl font-black text-white mb-10">${sessionData.revealedAnswer}</h2>
                        <div class="bg-slate-800 p-8 rounded-3xl border-2 border-slate-700 shadow-xl max-w-lg mx-auto w-full">
                            ${myAnswer ? `<p class="text-slate-400 font-bold text-sm mb-4">Du skrev: <span class="text-white">"${myAnswer.text}"</span></p>` : ''}
                            ${resultHtml}
                        </div>
                    </div>
                `;
            }
            else if (sessionData.gameState === 'finished') {
                const myTotalPoints = Object.values(playerData.answers || {}).reduce((sum, a) => sum + (a.points || 0), 0);
                appEl.innerHTML = `${teamHtml}
                    <div class="text-center flex-1 flex flex-col justify-center">
                        <h2 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-500 mb-8">Bra kämpat!</h2>
                        <div class="bg-slate-800 p-8 rounded-3xl border border-slate-700 shadow-xl max-w-sm mx-auto w-full">
                            <p class="text-slate-400 font-bold uppercase tracking-widest text-sm mb-2">Du drog in</p>
                            <p class="text-7xl font-black text-white">${myTotalPoints} <span class="text-3xl text-slate-500">p</span></p>
                            <p class="text-slate-400 font-bold text-sm mt-4">åt ditt lag</p>
                        </div>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
